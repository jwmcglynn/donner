name: Lint

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main, feature/ci-hardening-2026q2]

concurrency:
  # See main.yml for rationale; same shared push/PR dedupe pattern.
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

# Fast lint jobs covering checks that don't live inside `bazel test //...`:
#
# - clang-format (changed C++ files only — runs in <30s for typical PRs)
# - misc-include-cleaner (changed C++ files only — avoids blocking on
#   historical include debt while enforcing new diffs)
# - build_defs/check_banned_patterns.py (covers the examples/ dir which
#   is not fully enumerated by the donner_cc_* py_test lint macros)
# - gen_cmakelists.py unit tests + full --check validator (reentrant bazel
#   prevents running --check from inside bazel test; see design doc 0016)
jobs:
  lint:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          # Keep checkout shallow; if the PR base commit is missing we fetch
          # just that ref before the clang-format diff.
          fetch-depth: 2

      - name: Cache Bazel
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/bazel
          key: ${{ runner.os }}-bazel-lint-${{ hashFiles('.bazelversion', '.bazelrc', 'MODULE.bazel') }}
          restore-keys: |
            ${{ runner.os }}-bazel-lint-
            ${{ runner.os }}-bazel-

      - name: Install clang-format
        run: |
          if command -v clang-format >/dev/null 2>&1; then
            clang-format --version
            exit 0
          fi

          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check formatting on changed C++ files
        run: |
          # Determine the base ref. PR events expose it directly; pushes
          # diff against origin/main (HEAD~1 fallback for the very first commit
          # on a branch).
          if [[ -n "${{ github.event.pull_request.base.sha }}" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            if ! git cat-file -e "${BASE}^{commit}" 2>/dev/null; then
              git fetch --depth=1 origin "${{ github.event.pull_request.base.ref }}"
            fi
          else
            git fetch --depth=2 origin main 2>/dev/null || true
            BASE="$(git merge-base origin/main HEAD 2>/dev/null || echo HEAD~1)"
          fi

          MODIFIED="$(git diff --name-only --diff-filter=ACMR "${BASE}" HEAD \
            | grep -E '\.(cc|h|hpp|cpp)$' \
            | grep -v '^third_party/' || true)"

          if [[ -z "${MODIFIED}" ]]; then
            echo "No modified C++ files; nothing to check."
            exit 0
          fi

          echo "Checking ${MODIFIED}" | tr ' ' '\n'
          echo "${MODIFIED}" | xargs clang-format --dry-run -Werror

      - name: Check banned patterns in examples/
        shell: bash
        run: |
          # Examples/ isn't fully enumerated by the donner_cc_* py_test lint
          # macros (some examples are tagged manual and excluded from
          # `bazel test //...`), so we run the checker here directly.
          mapfile -t example_sources < <(
            find examples -maxdepth 1 -type f -name '*.cc' \
              ! -name 'render_test.cc' \
              ! -name 'wasm_reproducer.cc' \
              | sort
          )

          python3 build_defs/check_banned_patterns.py donner "${example_sources[@]}"

  misc-include-cleaner:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 50

      - name: Install clang-tidy
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 15
          command: |
            sudo apt-get update
            sudo apt-get install -y clang-tidy-19

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ runner.os }}
          repository-cache: true
          external-cache: true
          cache-save: ${{ github.ref == 'refs/heads/main' }}

      - name: Check misc-include-cleaner on changed C++ files
        run: |
          if [[ -n "${{ github.base_ref }}" ]]; then
            git fetch --depth=50 origin "${{ github.base_ref }}"
            BASE="$(git merge-base "origin/${{ github.base_ref }}" HEAD)"
          else
            git fetch --depth=50 origin main 2>/dev/null || true
            BASE="$(git merge-base origin/main HEAD 2>/dev/null || echo HEAD~1)"
          fi

          tools/run_misc_include_cleaner_diff.sh "${BASE}"

  cmake-validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: gen_cmakelists.py --check
        run: python3 tools/cmake/gen_cmakelists.py --check
