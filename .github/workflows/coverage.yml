name: Coverage

# Runs coverage on: main merges (the Codecov baseline), PR pushes (INCREMENTAL:
# only the changed code's affected targets, so Codecov can still patch-annotate),
# and on-demand via workflow_dispatch.
#
# Codecov's patch-coverage signal ("X% of changed lines covered") requires the
# PR head's own coverage upload measured against the main-branch baseline, so we
# cannot simply drop the pull_request trigger. But the FULL instrumented re-run
# on every PR was the single worst violator of the 15-minute PR CI budget: the
# A 40-run CI speed profile measured it at ~21 min median with a 3.3 h tail,
# ~99% of that being one instrumented re-run of tests CI already runs, whose
# only unique output is the Codecov patch percentage.
#
# So PR coverage is scoped to the affected-target subset via the same bazel-diff
# mechanism as CI (see determine-targets below); the patch annotation survives
# on the subset that actually changed. When the diff cannot be scoped to a
# genuine subset (infra-file changes, bazel-diff failure, missing/empty diff),
# the reason resolves to a FULL //... target set: running that on a PR is exactly
# the 21-min re-run we are eliminating, so the PR coverage jobs SKIP instead --
# the main-push baseline already covers those lines. Only the affected subset
# (fallback_reason == bazel_diff), the cheap smoke subset (coverage_smoke), and
# the explicit ci:full-test opt-in still produce PR coverage.
#
# One more skip: a genuine incremental subset whose affected targets contain
# NO instrumentable C/C++ (docs-only, shell/python tooling, filegroup/flag-only
# changes) also SKIPs the coverage lane. Building coverage over such a subset
# yields an empty LCOV report and trips check_lcov_report.py's "no executable
# line data" guard -- a deterministic red no rerun can clear. That subset is
# detected from target KINDS via a bazel query over the affected set
# (fallback_reason == no_instrumentable_targets), never from file extensions,
# and the detection fails closed: any query/classifier error or unrecognized
# rule kind runs coverage with the guard intact. "Instrumentable" means
# HOST-instrumentable: wasm-platform targets (the emsdk wasm_cc_binary
# wrapper and its host-incompatible cc_binary shim, detected via a host
# cquery) never emit host profile data, so a wasm-packaging-only subset
# also skips instead of failing on a guaranteed-empty report. A subset
# that DOES touch host-instrumentable code keeps the guard at full
# strength: shared C++ sources always impact their host cc_library/cc_test
# owners too, which classify as instrumentable. Future readers:
# do not silently re-add a full instrumented PR coverage run.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # Re-run on demand (e.g. before final merge)

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('pr-{0}-{1}', github.workflow, github.event.pull_request.number) || format('push-{0}-{1}', github.workflow, github.run_id) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
#
# Self-hosted coverage uses the same operator-only gate as CI's Linux lane:
# SELFHOSTED_LINUX_RUNNER must be "true", and both actor identities must be
# jwmcglynn. That prevents collaborator reruns from executing on the homelab
# runner or seeing the Codecov secret there. Everyone else stays on hosted
# Ubuntu.
#
# Trusted operator PRs and main pushes generate coverage on the self-hosted
# runner when SELFHOSTED_LINUX_RUNNER is enabled. Renovate and non-operator
# diffs stay on hosted Ubuntu. The Codecov upload remains a tiny hosted handoff
# for self-hosted coverage so the Codecov secret is not exposed to the runner.
jobs:
  determine-targets:
    runs-on: ubuntu-24.04
    if: ${{ github.ref == 'refs/heads/main' || github.event_name == 'pull_request' }}
    env:
      BAZEL_DIFF_TAG: "v18.1.0"
      FULL_COVERAGE_TARGETS: "//donner/base/... //donner/css/... //donner/svg/... //donner/editor/..."
      SMOKE_COVERAGE_TARGETS: "//donner/base/..."
    outputs:
      fallback: ${{ steps.determine.outputs.fallback }}
      fallback_reason: ${{ steps.determine.outputs.fallback_reason }}
      targets: ${{ steps.determine.outputs.targets }}
      target_count: ${{ steps.determine.outputs.target_count }}
      large_change: ${{ steps.determine.outputs.large_change }}
      changed_file_count: ${{ steps.determine.outputs.changed_file_count }}
      use_self_hosted_linux: ${{ steps.determine.outputs.use_self_hosted_linux }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          repository-cache: true
          external-cache: true
          cache-save: false

      - name: Download bazel-diff
        if: github.event_name == 'pull_request'
        run: curl -fsSL -o "$RUNNER_TEMP/bazel-diff.jar" "https://github.com/Tinder/bazel-diff/releases/download/${BAZEL_DIFF_TAG}/bazel-diff_deploy.jar"

      - id: pr-meta
        name: Extract PR base SHA for hash caching
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          echo "base_sha=$(python3 -c 'import json, os; print(json.load(open(os.environ["GITHUB_EVENT_PATH"], encoding="utf-8")).get("pull_request", {}).get("base", {}).get("sha", ""))')" >> "$GITHUB_OUTPUT"

      # Shares the cache convention (and main-push pre-warm) with main.yml's
      # determine-targets: base hashes are keyed by (bazel-diff version,
      # base SHA) and skip half the bazel-diff work on a hit.
      - name: Cache bazel-diff base hashes
        if: github.event_name == 'pull_request' && steps.pr-meta.outputs.base_sha != ''
        uses: actions/cache@v6
        with:
          path: ~/.cache/bazel-diff-base-hashes/${{ steps.pr-meta.outputs.base_sha }}.json
          key: bazel-diff-base-hashes-tt-${{ env.BAZEL_DIFF_TAG }}-${{ steps.pr-meta.outputs.base_sha }}

      - id: determine
        name: Determine coverage targets
        shell: bash
        env:
          ACTOR: ${{ github.actor }}
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ github.token }}
          REF: ${{ github.ref }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
          TRIGGERING_ACTOR: ${{ github.triggering_actor }}
          SELFHOSTED_LINUX_RUNNER: ${{ vars.SELFHOSTED_LINUX_RUNNER }}
        run: |
          set -euo pipefail
          SELF_HOSTED_MAX_CHANGED_FILES=75
          large_change=false
          changed_file_count=0

          diagnostics_dir="$RUNNER_TEMP/coverage-target-selection"
          mkdir -p "$diagnostics_dir"

          is_renovate="$(
            python3 - <<'PY'
          import json
          import os

          event = json.load(open(os.environ["GITHUB_EVENT_PATH"], encoding="utf-8"))
          paths = [
              ("sender", "login"),
              ("pull_request", "user", "login"),
              ("head_commit", "author", "username"),
              ("head_commit", "author", "name"),
              ("head_commit", "author", "email"),
              ("head_commit", "committer", "username"),
              ("head_commit", "committer", "name"),
              ("head_commit", "committer", "email"),
              ("pusher", "name"),
              ("pusher", "email"),
          ]

          values = []
          for path in paths:
              value = event
              for key in path:
                  if not isinstance(value, dict):
                      value = None
                      break
                  value = value.get(key)
              if value:
                  values.append(str(value))

          print("true" if any("renovate" in value.lower() for value in values) else "false")
          PY
          )"

          pr_author="$(
            python3 - <<'PY'
          import json
          import os

          event = json.load(open(os.environ["GITHUB_EVENT_PATH"], encoding="utf-8"))
          print(event.get("pull_request", {}).get("user", {}).get("login", ""))
          PY
          )"

          if [[ -z "$pr_author" && "$EVENT_NAME" == "push" && "$REF" == "refs/heads/main" ]]; then
            if ! pr_author="$(gh api -H "Accept: application/vnd.github+json" \
              "/repos/$REPOSITORY/commits/$SHA/pulls" \
              --jq '.[0].user.login // ""')"; then
              pr_author="unknown"
            fi
          fi

          use_self_hosted_linux=false
          if [[ "$ACTOR" == "jwmcglynn" && "$TRIGGERING_ACTOR" == "jwmcglynn" && "$is_renovate" != "true" && "$SELFHOSTED_LINUX_RUNNER" == "true" ]]; then
            if [[ -z "$pr_author" || "$pr_author" == "jwmcglynn" ]]; then
              use_self_hosted_linux=true
            fi
          fi
          echo "use_self_hosted_linux=$use_self_hosted_linux" >> "$GITHUB_OUTPUT"
          echo "coverage_runner=self_hosted_linux:$use_self_hosted_linux renovate:$is_renovate pr_author:$pr_author"

          emit_targets() {
            local fallback="$1"
            local reason="$2"
            local targets="$3"
            local count
            count="$(wc -w <<< "$targets" | tr -d ' ')"

            {
              echo "fallback=$fallback"
              echo "fallback_reason=$reason"
              echo "targets=$targets"
              echo "target_count=$count"
              echo "large_change=$large_change"
              echo "changed_file_count=$changed_file_count"
            } >> "$GITHUB_OUTPUT"

            {
              echo "fallback=$fallback"
              echo "fallback_reason=$reason"
              echo "target_count=$count"
              echo "large_change=$large_change"
              echo "changed_file_count=$changed_file_count"
              echo
              echo "$targets" | tr ' ' '\n'
            } > "$diagnostics_dir/summary.txt"
          }

          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "Non-PR event; using full coverage target set."
            emit_targets true non_pr "$FULL_COVERAGE_TARGETS"
            exit 0
          fi

          eval "$(
            python3 -c 'import json, os, shlex; event = json.load(open(os.environ["GITHUB_EVENT_PATH"], encoding="utf-8")); pr = event.get("pull_request", {}); labels = [label.get("name", "") for label in pr.get("labels", [])]; values = {"BASE_SHA": pr.get("base", {}).get("sha", ""), "HEAD_SHA": pr.get("head", {}).get("sha", ""), "FORCE_FULL_TEST": "true" if "ci:full-test" in labels else "false"}; print("\n".join(f"{key}={shlex.quote(value)}" for key, value in values.items()))'
          )"

          if [[ -z "$BASE_SHA" || -z "$HEAD_SHA" ]]; then
            echo "Missing PR base/head SHA; using full coverage target set."
            emit_targets true missing_pr_sha "$FULL_COVERAGE_TARGETS"
            exit 0
          fi

          if [[ "$FORCE_FULL_TEST" == "true" ]]; then
            echo "ci:full-test label present; using full coverage target set."
            emit_targets true full_test_label "$FULL_COVERAGE_TARGETS"
            exit 0
          fi

          # Diff from the merge-base, not the base tip. The event payload's
          # base.sha is the base branch's CURRENT tip, so a two-dot diff
          # attributes post-fork drift on main (e.g. a workflow file merged
          # after this branch forked) to the PR, tripping the infra detector
          # and forcing a spurious full //... fallback. Merge-base semantics
          # sees only branch-side changes. Fail closed: if merge-base cannot
          # be computed, keep the base-tip diff (over-inclusion only ever
          # widens to the fallback path, never skips it).
          if diff_base="$(git merge-base "$BASE_SHA" "$HEAD_SHA")"; then
            echo "Using merge-base $diff_base as diff basis."
          else
            echo "git merge-base failed; using base tip $BASE_SHA as diff basis."
            diff_base="$BASE_SHA"
          fi
          changed_files="$(git diff --name-only "$diff_base" "$HEAD_SHA")"
          printf "%s\n" "$changed_files" > "$diagnostics_dir/changed-files.txt"
          changed_file_count="$(printf '%s\n' "$changed_files" | sed '/^$/d' | wc -l | tr -d ' ')"
          if (( changed_file_count > SELF_HOSTED_MAX_CHANGED_FILES )); then
            large_change=true
            echo "Large PR (${changed_file_count} changed files) exceeds self-hosted coverage cap (${SELF_HOSTED_MAX_CHANGED_FILES}); using hosted coverage lane."
          fi

          if [[ -z "$changed_files" ]]; then
            echo "No changed files detected; using full coverage target set."
            emit_targets true no_changed_files "$FULL_COVERAGE_TARGETS"
            exit 0
          fi

          should_fallback=false
          fallback_reason=""
          smoke_only=true
          while IFS= read -r path; do
            [[ -z "$path" ]] && continue
            case "$path" in
              MODULE.bazel|WORKSPACE|WORKSPACE.*|build_defs/*|third_party/bazel/*)
                echo "Build graph infrastructure change requires full coverage: $path"
                should_fallback=true
                fallback_reason="infra_change"
                break
                ;;
            esac

            case "$path" in
              .bazelrc|.github/workflows/*|.github/actions/*|docs/*|*.md|tools/binary_size.sh|tools/build_docs.sh|tools/coverage.sh|tools/filter_coverage.py|tools/filter_coverage_tests.py|tools/lcov_metrics.py|tools/lcov_metrics_tests.py|tools/generate_build_report.py|tools/generate_build_report_tests.py|tools/coverage_instrumentable_targets.py|tools/coverage_instrumentable_targets_tests.py|tools/coverage_variant_trim.py|tools/coverage_variant_trim_tests.py)
                ;;
              *)
                smoke_only=false
                ;;
            esac
          done <<< "$changed_files"

          if [[ "$should_fallback" == "true" ]]; then
            emit_targets true "$fallback_reason" "$FULL_COVERAGE_TARGETS"
            exit 0
          fi

          if [[ "$smoke_only" == "true" ]]; then
            echo "Coverage/reporting/tooling-only change; using smoke coverage target set."
            emit_targets true coverage_smoke "$SMOKE_COVERAGE_TARGETS"
            exit 0
          fi

          work_dir="$(mktemp -d)"
          base_dir="$work_dir/base"
          head_dir="$work_dir/head"
          cleanup() {
            git worktree remove --force "$base_dir" 2>/dev/null || true
            git worktree remove --force "$head_dir" 2>/dev/null || true
            rm -rf "$work_dir"
          }
          trap cleanup EXIT

          # Hash the current base TIP against the PR's MERGE commit (the
          # workspace checkout, refs/pull/N/merge), not against HEAD_SHA.
          # Hashing base-tip vs HEAD_SHA attributes post-fork drift on main to
          # the PR, inflating the affected set on any branch that has not
          # rebased (measured up to 126x over-inclusion; see
          # docs/design_docs/0029-2). In the tip-vs-merge comparison, drift is
          # present on BOTH sides, so unchanged-by-the-PR targets hash
          # identically and drop out; and because the merge graph is the one
          # hashed, reverse dependencies that exist ONLY in the merge (a dep
          # edge added on main after the fork onto code this PR touches) are
          # still caught - the coverage job builds this same merge ref.
          # Fail closed: if the workspace is not a merge commit (e.g. a
          # checkout override), it IS the PR head and this degrades to exactly
          # the old base-tip-vs-head comparison.
          merge_sha="$(git rev-parse HEAD)"
          if ! git worktree add --detach "$head_dir" "$merge_sha"; then
            echo "Failed to check out PR merge commit; using full coverage target set."
            emit_targets true head_checkout_failed "$FULL_COVERAGE_TARGETS"
            exit 0
          fi

          cached_base="$HOME/.cache/bazel-diff-base-hashes/$BASE_SHA.json"
          if [[ -s "$cached_base" ]]; then
            echo "Using cached bazel-diff base hashes for $BASE_SHA."
            cp "$cached_base" "$work_dir/base-hashes.json"
          else
            if ! git worktree add --detach "$base_dir" "$BASE_SHA"; then
              echo "Failed to check out PR base; using full coverage target set."
              emit_targets true base_checkout_failed "$FULL_COVERAGE_TARGETS"
              exit 0
            fi

            if ! java -jar "$RUNNER_TEMP/bazel-diff.jar" generate-hashes \
            --includeTargetType \
              -w "$base_dir" \
              -b bazelisk \
              "$work_dir/base-hashes.json"; then
              echo "bazel-diff failed while hashing base; using full coverage target set."
              emit_targets true base_hash_failed "$FULL_COVERAGE_TARGETS"
              exit 0
            fi

            # Save for subsequent pushes to this PR (post-job cache step).
            mkdir -p "$(dirname "$cached_base")"
            cp "$work_dir/base-hashes.json" "$cached_base"
          fi

          if ! java -jar "$RUNNER_TEMP/bazel-diff.jar" generate-hashes \
            --includeTargetType \
            -w "$head_dir" \
            -b bazelisk \
            "$work_dir/head-hashes.json"; then
            echo "bazel-diff failed while hashing head; using full coverage target set."
            emit_targets true head_hash_failed "$FULL_COVERAGE_TARGETS"
            exit 0
          fi

          if ! java -jar "$RUNNER_TEMP/bazel-diff.jar" get-impacted-targets \
            -tt Rule \
            -w "$head_dir" \
            -b bazelisk \
            -sh "$work_dir/base-hashes.json" \
            -fh "$work_dir/head-hashes.json" \
            -o "$work_dir/affected.txt"; then
            echo "bazel-diff failed while determining impacted targets; using full coverage target set."
            emit_targets true impacted_targets_failed "$FULL_COVERAGE_TARGETS"
            exit 0
          fi

          cp "$work_dir/affected.txt" "$diagnostics_dir/affected-targets.txt"

          affected="$(
            python3 -c 'import pathlib, sys; labels = [line.strip() for line in pathlib.Path(sys.argv[1]).read_text(encoding="utf-8").splitlines() if line.strip()]; print(" ".join(labels))' "$work_dir/affected.txt"
          )"

          if [[ -z "$affected" ]]; then
            echo "bazel-diff produced no affected targets; using full coverage target set."
            emit_targets true no_affected_targets "$FULL_COVERAGE_TARGETS"
            exit 0
          fi

          # Instrumentability gate. A genuine incremental subset that contains
          # zero instrumentable C/C++ targets (docs-only, shell/python tooling,
          # filegroup/flag-only changes) would build an empty LCOV report and
          # trip check_lcov_report.py's "no executable line data" guard -- a
          # deterministic red no rerun can clear. Decide from target KINDS via a
          # bazel query over the affected set (not file-extension heuristics) and
          # skip only when nothing instrumentable is affected. Fail closed: any
          # query/classifier error, or any unrecognized rule kind, keeps the
          # guard by running the bazel_diff subset as before.
          # Resolve aliases to their `actual` targets before classifying: an
          # alias can point at an instrumentable cc_* target (for example the
          # default alias donner_variant_cc_test emits, whose actual is a
          # cc_test), so an alias-only affected set must be judged by what it
          # resolves to, not by the `alias` kind. The query replaces every
          # alias in the set with its actual; an alias that cannot be resolved
          # stays an `alias` kind and the classifier treats it as instrumentable
          # (fail closed).
          kind_query_file="$work_dir/affected-query.txt"
          {
            printf 'let a = set('
            tr '\n' ' ' < "$work_dir/affected.txt"
            printf ') in ($a - kind("^alias rule$", $a)) + labels("actual", kind("^alias rule$", $a))\n'
          } > "$kind_query_file"
          label_kind_file="$work_dir/affected-label-kind.txt"
          if ( cd "$head_dir" && bazelisk query --query_file="$kind_query_file" \
              --output label_kind --keep_going ) > "$label_kind_file" 2> "$diagnostics_dir/kind-query.log"; then
            cp "$label_kind_file" "$diagnostics_dir/affected-label-kind.txt"
            instrumentable_file="$work_dir/instrumentable-label-kind.txt"
            if instrumentable_decision="$(python3 tools/coverage_instrumentable_targets.py \
                --label-kind-file "$label_kind_file" \
                --instrumentable-out "$instrumentable_file" 2> "$diagnostics_dir/instrumentability.log")"; then
              cat "$diagnostics_dir/instrumentability.log" || true
              if [[ "$instrumentable_decision" == "instrumentable_present=false" ]]; then
                echo "Affected subset has no instrumentable C/C++ targets; skipping PR coverage."
                emit_targets true no_instrumentable_targets ""
                exit 0
              fi
              # Host-compatibility recheck. "Instrumentable" means HOST-
              # instrumentable: a wasm bridge shim is a plain cc_binary by
              # kind but is target_compatible_with @platforms//:incompatible
              # on the host, so --skip_incompatible_explicit_targets (set in
              # --config=ci) silently drops it from the coverage build and
              # the run is guaranteed to produce an empty report (the #810
              # false RUN). Only when EVERY remaining instrumentable target
              # is a cc_binary do we spend a cquery to test host
              # compatibility; sets containing cc_library/cc_test/wrapper
              # kinds are host code and run coverage with zero extra cost.
              # Fail closed: cquery failure, or any label the cquery does
              # not report as incompatible, keeps the coverage run.
              if [[ -s "$instrumentable_file" ]] && ! grep -qv '^cc_binary rule ' "$instrumentable_file"; then
                echo "All instrumentable targets are cc_binary; rechecking host compatibility."
                compat_file="$work_dir/host-compat.txt"
                sed 's/^cc_binary rule //' "$instrumentable_file" | tr '\n' ' ' > "$work_dir/compat-labels.txt"
                if ( cd "$head_dir" && bazelisk cquery "set($(cat "$work_dir/compat-labels.txt"))" \
                    --output=starlark \
                    --starlark:expr='"{} {}".format(target.label, "HOST_INCOMPATIBLE" if "IncompatiblePlatformProvider" in providers(target) else "HOST_COMPATIBLE")' \
                    ) > "$compat_file" 2> "$diagnostics_dir/compat-query.log"; then
                  cp "$compat_file" "$diagnostics_dir/host-compat.txt"
                  grep ' HOST_INCOMPATIBLE$' "$compat_file" | sed 's/ HOST_INCOMPATIBLE$//' > "$work_dir/host-incompatible.txt" || true
                  if recheck_decision="$(python3 tools/coverage_instrumentable_targets.py \
                      --label-kind-file "$label_kind_file" \
                      --host-incompatible-file "$work_dir/host-incompatible.txt" 2>> "$diagnostics_dir/instrumentability.log")"; then
                    if [[ "$recheck_decision" == "instrumentable_present=false" ]]; then
                      echo "All remaining instrumentable targets are host-incompatible (wasm-platform); skipping PR coverage."
                      emit_targets true no_instrumentable_targets ""
                      exit 0
                    fi
                  fi
                else
                  echo "Host-compatibility cquery failed; running coverage (guard intact)."
                  cat "$diagnostics_dir/compat-query.log" || true
                fi
              fi
              echo "Affected subset includes instrumentable C/C++ targets; running coverage."
            else
              echo "Instrumentability classifier errored; running coverage on affected subset (guard intact)."
            fi
          else
            echo "Kind query failed; running coverage on affected subset (guard intact)."
            cat "$diagnostics_dir/kind-query.log" || true
          fi

          # Representative-variant trim (operator-approved policy, 2026-07-11):
          # PR PATCH coverage runs one representative variant per test - the
          # base/default target - and drops `_tiny`/`_text_full`/`_geode`
          # variant wrappers whose base sibling is in the set. The wrappers
          # compile the SAME sources under different backend/feature flags, so
          # for patch coverage they are redundant parameterizations whose
          # unique signal (backend/feature-gated lines) stays covered by the
          # main-push FULL multi-variant baseline. Fail closed: tool failure
          # keeps the untrimmed set; variant-only targets (no base sibling)
          # are never dropped. See tools/coverage_variant_trim.py and
          # docs/design_docs/0029-2.
          printf '%s\n' $affected > "$work_dir/affected-pretrim.txt"
          if trimmed="$(python3 tools/coverage_variant_trim.py \
              --affected-file "$work_dir/affected-pretrim.txt" \
              --dropped-out "$diagnostics_dir/variant-trim-dropped.txt" 2> "$diagnostics_dir/variant-trim.log")"; then
            cat "$diagnostics_dir/variant-trim.log" || true
            if [[ -n "$trimmed" ]]; then
              affected="$(tr '\n' ' ' <<< "$trimmed" | sed 's/ $//')"
            else
              echo "Variant trim produced an empty set; keeping untrimmed affected set (guard intact)."
            fi
          else
            echo "Variant trim tool errored; keeping untrimmed affected set (guard intact)."
            cat "$diagnostics_dir/variant-trim.log" || true
          fi

          emit_targets false bazel_diff "$affected"

      - name: Upload target selection artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-target-selection-${{ github.run_attempt }}
          path: ${{ runner.temp }}/coverage-target-selection
          if-no-files-found: ignore
          retention-days: 3

  build:
    runs-on: ubuntu-24.04
    needs: determine-targets
    # Hosted PR coverage fallback (large-change PRs, untrusted actors,
    # self-hosted unavailable, or ci:full-test fanout). On PRs it runs ONLY when
    # the target set is a genuine incremental subset (fallback == false =>
    # bazel_diff), the cheap smoke subset, or an explicit ci:full-test opt-in. A
    # full //... fallback on a PR (infra change, bazel-diff failure, empty diff)
    # is SKIPPED here -- the main-push baseline covers those lines under the
    # 15-minute PR budget.
    if: ${{ (needs.determine-targets.outputs.use_self_hosted_linux != 'true' || needs.determine-targets.outputs.large_change == 'true') && (github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && (needs.determine-targets.outputs.fallback == 'false' || needs.determine-targets.outputs.fallback_reason == 'coverage_smoke' || needs.determine-targets.outputs.fallback_reason == 'full_test_label'))) }}

    steps:
      - uses: actions/checkout@v7

      - name: Free hosted runner disk
        shell: bash
        run: |
          set -euo pipefail

          echo "::group::Disk before cleanup"
          df -h /
          echo "::endgroup::"

          sudo rm -rf \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/.ghcup \
            /usr/local/lib/android \
            /usr/local/share/boost \
            /usr/share/dotnet \
            /usr/share/swift
          docker system prune --all --force || true
          sudo apt-get clean

          echo "::group::Disk after cleanup"
          df -h /
          echo "::endgroup::"

      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: 11
          distribution: "microsoft"

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          # Coverage already keeps large instrumented objects, profraw files,
          # and LCOV merge outputs in Bazel's output tree. A second local
          # disk cache duplicates enough of that data to fill hosted runners.
          repository-cache: true
          external-cache: true
          cache-save: ${{ github.ref == 'refs/heads/main' }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libncurses-dev pkg-config libfontconfig1-dev libfreetype6-dev \
            mesa-vulkan-drivers libvulkan1 libvulkan-dev \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libgl1-mesa-dev libosmesa6-dev
          sudo apt-get clean

      - name: Generate coverage
        shell: bash
        run: |
          set -euo pipefail
          read -r -a TARGETS <<< "${{ needs.determine-targets.outputs.targets }}"
          echo "Coverage target selection: fallback=${{ needs.determine-targets.outputs.fallback }} reason=${{ needs.determine-targets.outputs.fallback_reason }} count=${{ needs.determine-targets.outputs.target_count }}"
          printf "Coverage targets:\n"
          printf "  %s\n" "${TARGETS[@]}"
          echo "::group::Disk before coverage"
          df -h / "$GITHUB_WORKSPACE" "$RUNNER_TEMP"
          echo "::endgroup::"
          tools/coverage.sh --quiet --no-html "${TARGETS[@]}"
          echo "::group::Disk after coverage"
          df -h / "$GITHUB_WORKSPACE" "$RUNNER_TEMP"
          echo "::endgroup::"

      - name: Upload coverage diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-diagnostics-${{ github.job }}-${{ github.run_attempt }}
          path: coverage-report/*.log
          retention-days: 3
          if-no-files-found: ignore

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage-report/filtered_report.dat
          disable_search: true
          flags: unittests
          fail_ci_if_error: true
          verbose: false

  coverage-self-hosted:
    runs-on: [self-hosted, linux, arm64]
    needs: determine-targets
    # here on PRs, plus explicit ci:full-test opt-ins. A full //... fallback is
    # skipped on PRs (main-push baseline covers it). Trusted main pushes run
    # here instead of hosted Ubuntu. Large-change PRs (over the changed-file
    # cap) stay on the hosted coverage lane.
    if: ${{ needs.determine-targets.outputs.use_self_hosted_linux == 'true' && needs.determine-targets.outputs.large_change != 'true' && (github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && (needs.determine-targets.outputs.fallback == 'false' || needs.determine-targets.outputs.fallback_reason == 'coverage_smoke' || needs.determine-targets.outputs.fallback_reason == 'full_test_label'))) }}
    # Coverage healthy median is ~21 min, so bound this SLA lane at 60 min for
    # buffer: RE degradation fast-fails (no local fallback, below) instead of
    # the CPU-capped 2-3 h local re-run that produced the 3.3 h tail.
    timeout-minutes: 60
    # Admission control on the shared remote-execution backend. Two concurrent
    # instrumented coverage builds were the measured failure that hit the
    # timeout: both self-hosted lanes execute on a shared remote-execution
    # backend that an interactive development host also uses with priority, so
    # two-plus concurrent instrumented builds oversubscribe it and crawl into
    # the timeout (measured). This group serializes coverage-self-hosted across
    # all of the operator's in-flight PRs so at most one instrumented coverage
    # build runs at a time; the CI linux-self-hosted lane uses a separate group.
    # cancel-in-progress: false never kills a running build (a superseded push
    # to the SAME PR is already cancelled by the workflow-level group).
    concurrency:
      group: donner-selfhosted-coverage-re
      cancel-in-progress: false
    env:
      # RE-availability SLA: do NOT fall back to local execution when remote
      # execution is unavailable or degraded. A CPU-capped self-hosted runner
      # executing an instrumented coverage build
      # locally is exactly the measured 2-3 h tail; fast-fail and let the
      # wedge-watch + rerun handle RE recovery instead. --remote_timeout
      # stays at 60s (not 5s): a healthy-but-busy endpoint can legitimately take
      # >5s to accept large coverage uploads under a multi-job burst (observed
      # 2026-07-02 as DEADLINE_EXCEEDED upload failures); 60s fails fast enough
      # on a dead endpoint while tolerating a loaded one.
      BAZEL_SELF_HOSTED_REMOTE_FALLBACK_FLAGS: "--remote_local_fallback=false --incompatible_remote_local_fallback_for_remote_cache=false --remote_timeout=60s"
      DONNER_COVERAGE_BAZEL_FLAGS: "--remote_local_fallback=false --incompatible_remote_local_fallback_for_remote_cache=false --remote_timeout=60s"

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Sync Bazel toolchain
        # Keep this in sync with CI's self-hosted Linux cleanup (main.yml).
        # Surgically reset ONLY @local_config_cc (stale NixOS include paths)
        # instead of `bazelisk clean --expunge`, which also wiped the
        # persistent LLVM toolchain and forced a ~5-minute re-fetch every run.
        shell: bash
        run: |
          set -euo pipefail
          output_base=$(bazelisk info output_base)
          bazelisk shutdown
          find "$output_base/external" -maxdepth 1 -name '*local_config_cc*' \
            -print -exec rm -rf {} + 2>/dev/null || true

      - name: Fetch Bazel LLVM toolchain
        shell: bash
        run: |
          set -euo pipefail
          read -r -a TARGETS <<< "${{ needs.determine-targets.outputs.targets }}"
          echo "Coverage target selection: fallback=${{ needs.determine-targets.outputs.fallback }} reason=${{ needs.determine-targets.outputs.fallback_reason }} count=${{ needs.determine-targets.outputs.target_count }}"
          printf "Coverage targets:\n"
          printf "  %s\n" "${TARGETS[@]}"

          fetch_llvm() {
            bazelisk fetch --config=ci --config=latest_llvm "${TARGETS[@]}"
          }

          cleanup_partial_llvm_fetch() {
            local output_base
            output_base=$(bazelisk info output_base 2>/dev/null || true)
            bazelisk shutdown || true

            echo "::group::Bazel disk state before LLVM fetch retry"
            df -h /var/cache/bazel "$GITHUB_WORKSPACE" || true
            if [[ -n "$output_base" && -d "$output_base/external" ]]; then
              du -sh "$output_base"/external/*llvm_toolchain_linux_aarch64_llvm* 2>/dev/null || true
            fi
            echo "::endgroup::"

            if [[ -n "$output_base" && -d "$output_base/external" ]]; then
              find "$output_base/external" -maxdepth 1 -name '*llvm_toolchain_linux_aarch64_llvm*' \
                -print -exec rm -rf {} + 2>/dev/null || true
            fi
          }

          if ! fetch_llvm; then
            cleanup_partial_llvm_fetch
            fetch_llvm
          fi
          # NOTE: no `bazelisk shutdown` — Generate coverage reuses this
          # server's loading/analysis instead of paying a fresh JVM start.

      - name: Generate coverage
        shell: bash
        run: |
          set -euo pipefail
          export DONNER_CI_DIAGNOSTICS_DIR="$RUNNER_TEMP/donner-ci-diagnostics"
          echo "DONNER_CI_DIAGNOSTICS_DIR=$DONNER_CI_DIAGNOSTICS_DIR" >> "$GITHUB_ENV"
          read -r -a TARGETS <<< "${{ needs.determine-targets.outputs.targets }}"
          echo "Coverage target selection: fallback=${{ needs.determine-targets.outputs.fallback }} reason=${{ needs.determine-targets.outputs.fallback_reason }} count=${{ needs.determine-targets.outputs.target_count }}"
          tools/coverage.sh --quiet --no-html "${TARGETS[@]}"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: self-hosted-coverage-report
          path: coverage-report/filtered_report.dat
          if-no-files-found: error
          retention-days: 1

      - name: Upload coverage diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ci-diagnostics-${{ github.job }}-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/donner-ci-diagnostics/
            coverage-report/*.log
          retention-days: 3
          if-no-files-found: ignore

  upload-self-hosted-coverage:
    needs: [determine-targets, coverage-self-hosted]
    runs-on: ubuntu-24.04
    # Mirrors coverage-self-hosted's gate so the upload skips whenever the
    # self-hosted coverage job skips or fails (large-change and full-fallback
    # PRs produce no artifact).
    if: ${{ needs.coverage-self-hosted.result == 'success' }}

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Download coverage artifact
        uses: actions/download-artifact@v8
        with:
          name: self-hosted-coverage-report
          path: coverage-report

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage-report/filtered_report.dat
          disable_search: true
          flags: unittests
          fail_ci_if_error: true
          verbose: false
