name: Coverage

# Runs coverage on: main merges, every PR push (so Codecov has data to
# annotate the patch with), and on-demand via workflow_dispatch.
#
# We previously dropped the pull_request trigger thinking Codecov could
# patch-annotate without a PR-side run, but Codecov's patch-coverage signal
# requires the PR head's own `coverage.dat` upload to compute "X% of changed
# lines covered" against the main-branch baseline.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # Re-run on demand (e.g. before final merge)

permissions:
  contents: read

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('pr-{0}-{1}', github.workflow, github.event.pull_request.number) || format('push-{0}-{1}', github.workflow, github.run_id) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
#
# Self-hosted coverage uses the same operator-only gate as CI's Linux lane:
# SELFHOSTED_LINUX_RUNNER must be "true", and both actor identities must be
# jwmcglynn. That prevents collaborator reruns from executing on the homelab
# runner or seeing the Codecov secret there. Everyone else stays on hosted
# Ubuntu.
#
# Main coverage stays GitHub-hosted. PR coverage uses the self-hosted lane
# only when the trusted runner gate passes; hosted Ubuntu remains the PR
# fallback for untrusted actors, unavailable self-hosted runners, and
# `ci:full-test` fanout runs.
jobs:
  determine-targets:
    runs-on: ubuntu-24.04
    if: ${{ github.ref == 'refs/heads/main' || github.event_name == 'pull_request' }}
    env:
      BAZEL_DIFF_TAG: "v18.1.0"
      FULL_COVERAGE_TARGETS: "//donner/base/... //donner/css/... //donner/svg/... //donner/editor/..."
      SMOKE_COVERAGE_TARGETS: "//donner/base/..."
    outputs:
      fallback: ${{ steps.determine.outputs.fallback }}
      fallback_reason: ${{ steps.determine.outputs.fallback_reason }}
      targets: ${{ steps.determine.outputs.targets }}
      target_count: ${{ steps.determine.outputs.target_count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          repository-cache: true
          external-cache: true
          cache-save: false

      - name: Download bazel-diff
        if: github.event_name == 'pull_request'
        run: curl -fsSL -o "$RUNNER_TEMP/bazel-diff.jar" "https://github.com/Tinder/bazel-diff/releases/download/${BAZEL_DIFF_TAG}/bazel-diff_deploy.jar"

      - id: pr-meta
        name: Extract PR base SHA for hash caching
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          echo "base_sha=$(python3 -c 'import json, os; print(json.load(open(os.environ["GITHUB_EVENT_PATH"], encoding="utf-8")).get("pull_request", {}).get("base", {}).get("sha", ""))')" >> "$GITHUB_OUTPUT"

      # Shares the cache convention (and main-push pre-warm) with main.yml's
      # determine-targets: base hashes are keyed by (bazel-diff version,
      # base SHA) and skip half the bazel-diff work on a hit.
      - name: Cache bazel-diff base hashes
        if: github.event_name == 'pull_request' && steps.pr-meta.outputs.base_sha != ''
        uses: actions/cache@v6
        with:
          path: ~/.cache/bazel-diff-base-hashes/${{ steps.pr-meta.outputs.base_sha }}.json
          key: bazel-diff-base-hashes-tt-${{ env.BAZEL_DIFF_TAG }}-${{ steps.pr-meta.outputs.base_sha }}

      - id: determine
        name: Determine coverage targets
        shell: bash
        run: |
          set -euo pipefail

          diagnostics_dir="$RUNNER_TEMP/coverage-target-selection"
          mkdir -p "$diagnostics_dir"

          emit_targets() {
            local fallback="$1"
            local reason="$2"
            local targets="$3"
            local count
            count="$(wc -w <<< "$targets" | tr -d ' ')"

            {
              echo "fallback=$fallback"
              echo "fallback_reason=$reason"
              echo "targets=$targets"
              echo "target_count=$count"
            } >> "$GITHUB_OUTPUT"

            {
              echo "fallback=$fallback"
              echo "fallback_reason=$reason"
              echo "target_count=$count"
              echo
              echo "$targets" | tr ' ' '\n'
            } > "$diagnostics_dir/summary.txt"
          }

          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "Non-PR event; using full coverage target set."
            emit_targets true non_pr "$FULL_COVERAGE_TARGETS"
            exit 0
          fi

          eval "$(
            python3 -c 'import json, os, shlex; event = json.load(open(os.environ["GITHUB_EVENT_PATH"], encoding="utf-8")); pr = event.get("pull_request", {}); labels = [label.get("name", "") for label in pr.get("labels", [])]; values = {"BASE_SHA": pr.get("base", {}).get("sha", ""), "HEAD_SHA": pr.get("head", {}).get("sha", ""), "FORCE_FULL_TEST": "true" if "ci:full-test" in labels else "false"}; print("\n".join(f"{key}={shlex.quote(value)}" for key, value in values.items()))'
          )"

          if [[ -z "$BASE_SHA" || -z "$HEAD_SHA" ]]; then
            echo "Missing PR base/head SHA; using full coverage target set."
            emit_targets true missing_pr_sha "$FULL_COVERAGE_TARGETS"
            exit 0
          fi

          if [[ "$FORCE_FULL_TEST" == "true" ]]; then
            echo "ci:full-test label present; using full coverage target set."
            emit_targets true full_test_label "$FULL_COVERAGE_TARGETS"
            exit 0
          fi

          changed_files="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
          printf "%s\n" "$changed_files" > "$diagnostics_dir/changed-files.txt"

          if [[ -z "$changed_files" ]]; then
            echo "No changed files detected; using full coverage target set."
            emit_targets true no_changed_files "$FULL_COVERAGE_TARGETS"
            exit 0
          fi

          should_fallback=false
          fallback_reason=""
          smoke_only=true
          while IFS= read -r path; do
            [[ -z "$path" ]] && continue
            case "$path" in
              MODULE.bazel|WORKSPACE|WORKSPACE.*|build_defs/*|third_party/bazel/*)
                echo "Build graph infrastructure change requires full coverage: $path"
                should_fallback=true
                fallback_reason="infra_change"
                break
                ;;
            esac

            case "$path" in
              .bazelrc|.github/workflows/*|.github/actions/*|docs/*|*.md|tools/binary_size.sh|tools/build_docs.sh|tools/coverage.sh|tools/filter_coverage.py|tools/filter_coverage_tests.py|tools/lcov_metrics.py|tools/lcov_metrics_tests.py|tools/generate_build_report.py|tools/generate_build_report_tests.py)
                ;;
              *)
                smoke_only=false
                ;;
            esac
          done <<< "$changed_files"

          if [[ "$should_fallback" == "true" ]]; then
            emit_targets true "$fallback_reason" "$FULL_COVERAGE_TARGETS"
            exit 0
          fi

          if [[ "$smoke_only" == "true" ]]; then
            echo "Coverage/reporting/tooling-only change; using smoke coverage target set."
            emit_targets true coverage_smoke "$SMOKE_COVERAGE_TARGETS"
            exit 0
          fi

          work_dir="$(mktemp -d)"
          base_dir="$work_dir/base"
          head_dir="$work_dir/head"
          cleanup() {
            git worktree remove --force "$base_dir" 2>/dev/null || true
            git worktree remove --force "$head_dir" 2>/dev/null || true
            rm -rf "$work_dir"
          }
          trap cleanup EXIT

          if ! git worktree add --detach "$head_dir" "$HEAD_SHA"; then
            echo "Failed to check out PR head; using full coverage target set."
            emit_targets true head_checkout_failed "$FULL_COVERAGE_TARGETS"
            exit 0
          fi

          cached_base="$HOME/.cache/bazel-diff-base-hashes/$BASE_SHA.json"
          if [[ -s "$cached_base" ]]; then
            echo "Using cached bazel-diff base hashes for $BASE_SHA."
            cp "$cached_base" "$work_dir/base-hashes.json"
          else
            if ! git worktree add --detach "$base_dir" "$BASE_SHA"; then
              echo "Failed to check out PR base; using full coverage target set."
              emit_targets true base_checkout_failed "$FULL_COVERAGE_TARGETS"
              exit 0
            fi

            if ! java -jar "$RUNNER_TEMP/bazel-diff.jar" generate-hashes \
            --includeTargetType \
              -w "$base_dir" \
              -b bazelisk \
              "$work_dir/base-hashes.json"; then
              echo "bazel-diff failed while hashing base; using full coverage target set."
              emit_targets true base_hash_failed "$FULL_COVERAGE_TARGETS"
              exit 0
            fi

            # Save for subsequent pushes to this PR (post-job cache step).
            mkdir -p "$(dirname "$cached_base")"
            cp "$work_dir/base-hashes.json" "$cached_base"
          fi

          if ! java -jar "$RUNNER_TEMP/bazel-diff.jar" generate-hashes \
            --includeTargetType \
            -w "$head_dir" \
            -b bazelisk \
            "$work_dir/head-hashes.json"; then
            echo "bazel-diff failed while hashing head; using full coverage target set."
            emit_targets true head_hash_failed "$FULL_COVERAGE_TARGETS"
            exit 0
          fi

          if ! java -jar "$RUNNER_TEMP/bazel-diff.jar" get-impacted-targets \
            -tt Rule \
            -w "$head_dir" \
            -b bazelisk \
            -sh "$work_dir/base-hashes.json" \
            -fh "$work_dir/head-hashes.json" \
            -o "$work_dir/affected.txt"; then
            echo "bazel-diff failed while determining impacted targets; using full coverage target set."
            emit_targets true impacted_targets_failed "$FULL_COVERAGE_TARGETS"
            exit 0
          fi

          cp "$work_dir/affected.txt" "$diagnostics_dir/affected-targets.txt"

          affected="$(
            python3 -c 'import pathlib, sys; labels = [line.strip() for line in pathlib.Path(sys.argv[1]).read_text(encoding="utf-8").splitlines() if line.strip()]; print(" ".join(labels))' "$work_dir/affected.txt"
          )"

          if [[ -z "$affected" ]]; then
            echo "bazel-diff produced no affected targets; using full coverage target set."
            emit_targets true no_affected_targets "$FULL_COVERAGE_TARGETS"
            exit 0
          fi

          emit_targets false bazel_diff "$affected"

      - name: Upload target selection artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-target-selection-${{ github.run_attempt }}
          path: ${{ runner.temp }}/coverage-target-selection
          if-no-files-found: ignore
          retention-days: 3

  build:
    runs-on: ubuntu-24.04
    needs: determine-targets
    if: ${{ github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && (needs.determine-targets.outputs.fallback_reason == 'full_test_label' || vars.SELFHOSTED_LINUX_RUNNER != 'true' || github.actor != 'jwmcglynn' || github.triggering_actor != 'jwmcglynn')) }}

    steps:
      - uses: actions/checkout@v7

      - name: Free hosted runner disk
        shell: bash
        run: |
          set -euo pipefail

          echo "::group::Disk before cleanup"
          df -h /
          echo "::endgroup::"

          sudo rm -rf \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/.ghcup \
            /usr/local/lib/android \
            /usr/local/share/boost \
            /usr/share/dotnet \
            /usr/share/swift
          docker system prune --all --force || true
          sudo apt-get clean

          echo "::group::Disk after cleanup"
          df -h /
          echo "::endgroup::"

      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: 11
          distribution: "microsoft"

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          # Coverage already keeps large instrumented objects, profraw files,
          # and LCOV merge outputs in Bazel's output tree. A second local
          # disk cache duplicates enough of that data to fill hosted runners.
          repository-cache: true
          external-cache: true
          cache-save: ${{ github.ref == 'refs/heads/main' }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libncurses-dev pkg-config libfontconfig1-dev libfreetype6-dev \
            mesa-vulkan-drivers libvulkan1 libvulkan-dev \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libgl1-mesa-dev libosmesa6-dev
          sudo apt-get clean

      - name: Generate coverage
        shell: bash
        run: |
          set -euo pipefail
          read -r -a TARGETS <<< "${{ needs.determine-targets.outputs.targets }}"
          echo "Coverage target selection: fallback=${{ needs.determine-targets.outputs.fallback }} reason=${{ needs.determine-targets.outputs.fallback_reason }} count=${{ needs.determine-targets.outputs.target_count }}"
          printf "Coverage targets:\n"
          printf "  %s\n" "${TARGETS[@]}"
          echo "::group::Disk before coverage"
          df -h / "$GITHUB_WORKSPACE" "$RUNNER_TEMP"
          echo "::endgroup::"
          tools/coverage.sh --quiet --no-html "${TARGETS[@]}"
          echo "::group::Disk after coverage"
          df -h / "$GITHUB_WORKSPACE" "$RUNNER_TEMP"
          echo "::endgroup::"

      - name: Upload coverage diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-diagnostics-${{ github.job }}-${{ github.run_attempt }}
          path: coverage-report/*.log
          retention-days: 3
          if-no-files-found: ignore

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage-report/filtered_report.dat
          disable_search: true
          flags: unittests
          fail_ci_if_error: true
          verbose: false

  coverage-self-hosted:
    runs-on: [self-hosted, linux, arm64]
    needs: determine-targets
    if: ${{ github.event_name == 'pull_request' && vars.SELFHOSTED_LINUX_RUNNER == 'true' && github.actor == 'jwmcglynn' && github.triggering_actor == 'jwmcglynn' }}
    env:
      # The runner host may add the LAN Bazel cache from its home rc. Keep
      # coverage resilient when the private gRPC endpoint is down
      # (remote_local_fallback), but do NOT use an aggressive call deadline:
      # --remote_timeout applies to every remote call, and a healthy-but-busy
      # RE endpoint can legitimately take >5s to accept large coverage
      # uploads under a multi-job burst (observed 2026-07-02 as
      # DEADLINE_EXCEEDED upload failures). 60s fails fast enough on a dead
      # endpoint while tolerating a loaded one.
      BAZEL_SELF_HOSTED_REMOTE_FALLBACK_FLAGS: "--remote_local_fallback=true --incompatible_remote_local_fallback_for_remote_cache=true --remote_timeout=60s"
      DONNER_COVERAGE_BAZEL_FLAGS: "--remote_local_fallback=true --incompatible_remote_local_fallback_for_remote_cache=true --remote_timeout=60s"

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Sync Bazel toolchain
        # Keep this in sync with CI's self-hosted Linux cleanup (main.yml).
        # Surgically reset ONLY @local_config_cc (stale NixOS include paths)
        # instead of `bazelisk clean --expunge`, which also wiped the
        # persistent LLVM toolchain and forced a ~5-minute re-fetch every run.
        shell: bash
        run: |
          set -euo pipefail
          output_base=$(bazelisk info output_base)
          bazelisk shutdown
          find "$output_base/external" -maxdepth 1 -name '*local_config_cc*' \
            -print -exec rm -rf {} + 2>/dev/null || true

      - name: Fetch Bazel LLVM toolchain
        shell: bash
        run: |
          set -euo pipefail
          read -r -a TARGETS <<< "${{ needs.determine-targets.outputs.targets }}"
          echo "Coverage target selection: fallback=${{ needs.determine-targets.outputs.fallback }} reason=${{ needs.determine-targets.outputs.fallback_reason }} count=${{ needs.determine-targets.outputs.target_count }}"
          printf "Coverage targets:\n"
          printf "  %s\n" "${TARGETS[@]}"

          fetch_llvm() {
            bazelisk fetch --config=ci --config=latest_llvm "${TARGETS[@]}"
          }

          cleanup_partial_llvm_fetch() {
            local output_base
            output_base=$(bazelisk info output_base 2>/dev/null || true)
            bazelisk shutdown || true

            echo "::group::Bazel disk state before LLVM fetch retry"
            df -h /var/cache/bazel "$GITHUB_WORKSPACE" || true
            if [[ -n "$output_base" && -d "$output_base/external" ]]; then
              du -sh "$output_base"/external/*llvm_toolchain_linux_aarch64_llvm* 2>/dev/null || true
            fi
            echo "::endgroup::"

            if [[ -n "$output_base" && -d "$output_base/external" ]]; then
              find "$output_base/external" -maxdepth 1 -name '*llvm_toolchain_linux_aarch64_llvm*' \
                -print -exec rm -rf {} + 2>/dev/null || true
            fi
          }

          if ! fetch_llvm; then
            cleanup_partial_llvm_fetch
            fetch_llvm
          fi
          # NOTE: no `bazelisk shutdown` — Generate coverage reuses this
          # server's loading/analysis instead of paying a fresh JVM start.

      - name: Generate coverage
        shell: bash
        run: |
          set -euo pipefail
          export DONNER_CI_DIAGNOSTICS_DIR="$RUNNER_TEMP/donner-ci-diagnostics"
          echo "DONNER_CI_DIAGNOSTICS_DIR=$DONNER_CI_DIAGNOSTICS_DIR" >> "$GITHUB_ENV"
          read -r -a TARGETS <<< "${{ needs.determine-targets.outputs.targets }}"
          echo "Coverage target selection: fallback=${{ needs.determine-targets.outputs.fallback }} reason=${{ needs.determine-targets.outputs.fallback_reason }} count=${{ needs.determine-targets.outputs.target_count }}"
          tools/coverage.sh --quiet --no-html "${TARGETS[@]}"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: self-hosted-coverage-report
          path: coverage-report/filtered_report.dat
          if-no-files-found: error
          retention-days: 1

      - name: Upload coverage diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ci-diagnostics-${{ github.job }}-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/donner-ci-diagnostics/
            coverage-report/*.log
          retention-days: 3
          if-no-files-found: ignore

  upload-self-hosted-coverage:
    needs: coverage-self-hosted
    runs-on: ubuntu-24.04
    if: ${{ github.event_name == 'pull_request' && vars.SELFHOSTED_LINUX_RUNNER == 'true' && github.actor == 'jwmcglynn' && github.triggering_actor == 'jwmcglynn' }}

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Download coverage artifact
        uses: actions/download-artifact@v8
        with:
          name: self-hosted-coverage-report
          path: coverage-report

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage-report/filtered_report.dat
          disable_search: true
          flags: unittests
          fail_ci_if_error: true
          verbose: false
