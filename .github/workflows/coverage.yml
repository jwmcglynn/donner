name: Coverage

# Runs full coverage on main merges and workflow_dispatch. PRs use the same
# bazel-diff affected-target selection as CI so Codecov still has patch data
# without rebuilding the full coverage universe on every push.
#
# We previously dropped the pull_request trigger thinking Codecov could
# patch-annotate without a PR-side run, but Codecov's patch-coverage signal
# requires the PR head's own `coverage.dat` upload to compute "X% of changed
# lines covered" against the main-branch baseline.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Re-run on demand (e.g. before final merge)

permissions:
  contents: read

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
#
# Self-hosted coverage uses the same operator-only gate as CI's Linux lane:
# SELFHOSTED_LINUX_RUNNER must be "true", and both actor identities must be
# jwmcglynn. That prevents collaborator reruns from executing on the homelab
# runner or seeing the Codecov secret there. Everyone else stays on hosted
# Ubuntu.
jobs:
  determine-targets:
    runs-on: ubuntu-24.04
    env:
      BAZEL_DIFF_TAG: "v18.1.0"
    outputs:
      fallback: ${{ steps.determine.outputs.fallback }}
      affected: ${{ steps.determine.outputs.affected }}
      mode: ${{ steps.determine.outputs.mode }}
      reason: ${{ steps.determine.outputs.reason }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          repository-cache: true
          external-cache: true
          cache-save: false

      - name: Download bazel-diff
        run: curl -fsSL -o "$RUNNER_TEMP/bazel-diff.jar" "https://github.com/Tinder/bazel-diff/releases/download/${BAZEL_DIFF_TAG}/bazel-diff_deploy.jar"

      - id: determine
        name: Determine affected Bazel targets
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/ci_determine_targets.py \
            --bazel-diff-jar "$RUNNER_TEMP/bazel-diff.jar" \
            --diagnostics-dir "$RUNNER_TEMP/donner-target-diagnostics" \
            --github-output "$GITHUB_OUTPUT"

      - name: Upload target-selection diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: target-selection-${{ github.job }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/donner-target-diagnostics
          if-no-files-found: warn
          retention-days: 3

  build:
    runs-on: ubuntu-24.04
    needs: determine-targets
    if: ${{ vars.SELFHOSTED_LINUX_RUNNER != 'true' || github.actor != 'jwmcglynn' || github.triggering_actor != 'jwmcglynn' }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: 11
          distribution: "microsoft"

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: coverage-${{ runner.os }}-coverage
          repository-cache: true
          external-cache: true
          cache-save: ${{ github.ref == 'refs/heads/main' }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libncurses-dev pkg-config libfontconfig1-dev libfreetype6-dev \
            mesa-vulkan-drivers libvulkan1 libvulkan-dev \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libgl1-mesa-dev libosmesa6-dev

      - name: Generate coverage
        env:
          TARGET_FALLBACK: ${{ needs.determine-targets.outputs.fallback }}
          AFFECTED_TARGETS: ${{ needs.determine-targets.outputs.affected }}
        run: |
          set -euo pipefail
          if [[ "$TARGET_FALLBACK" == "true" ]]; then
            TARGETS=(
              //donner/base/...
              //donner/css/...
              //donner/svg/...
              //donner/editor/...
            )
          else
            read -r -a TARGETS <<< "$AFFECTED_TARGETS"
          fi
          tools/coverage.sh --no-html \
            "${TARGETS[@]}"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage-report/filtered_report.dat
          flags: unittests
          fail_ci_if_error: true
          verbose: true

  coverage-self-hosted:
    runs-on: [self-hosted, linux, arm64, event-horizon]
    needs: determine-targets
    if: ${{ vars.SELFHOSTED_LINUX_RUNNER == 'true' && github.actor == 'jwmcglynn' && github.triggering_actor == 'jwmcglynn' }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Sync Bazel toolchain
        # Keep this in sync with CI's self-hosted Linux cleanup (main.yml).
        # Surgically reset ONLY @local_config_cc (stale NixOS include paths)
        # instead of `bazelisk clean --expunge`, which also wiped the
        # persistent LLVM toolchain and forced a ~5-minute re-fetch every run.
        shell: bash
        run: |
          set -euo pipefail
          output_base=$(bazelisk info output_base)
          bazelisk shutdown
          find "$output_base/external" -maxdepth 1 -name '*local_config_cc*' \
            -print -exec rm -rf {} + 2>/dev/null || true

      - name: Init coverage diagnostics
        shell: bash
        env:
          TARGET_FALLBACK: ${{ needs.determine-targets.outputs.fallback }}
          TARGET_REASON: ${{ needs.determine-targets.outputs.reason }}
          AFFECTED_TARGETS: ${{ needs.determine-targets.outputs.affected }}
        run: |
          set -euo pipefail
          if [[ "$TARGET_FALLBACK" == "true" ]]; then
            export DONNER_CI_TARGETS="//donner/base/... //donner/css/... //donner/svg/... //donner/editor/..."
          else
            export DONNER_CI_TARGETS="$AFFECTED_TARGETS"
          fi
          export DONNER_CI_TARGET_FALLBACK="${TARGET_FALLBACK}:${TARGET_REASON}"
          bash tools/ci_diagnostics.sh init coverage-self-hosted

      - name: Fetch Bazel LLVM toolchain
        shell: bash
        run: |
          set -euo pipefail
          bash tools/ci_diagnostics.sh bazel fetch \
            bazelisk fetch --config=ci --config=latest_llvm
          bazelisk shutdown

      - name: Generate coverage
        shell: bash
        run: |
          set -euo pipefail
          bash tools/ci_diagnostics.sh coverage tools/coverage.sh --no-html

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v6
        with:
          name: self-hosted-coverage-report
          path: coverage-report/filtered_report.dat
          if-no-files-found: error
          retention-days: 1

      - name: Finalize CI diagnostics
        if: always()
        shell: bash
        run: bash tools/ci_diagnostics.sh finalize

      - name: Upload CI diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ci-diagnostics-${{ github.job }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/donner-ci-diagnostics
          if-no-files-found: warn
          retention-days: 3

  upload-self-hosted-coverage:
    needs: coverage-self-hosted
    runs-on: ubuntu-24.04
    if: ${{ vars.SELFHOSTED_LINUX_RUNNER == 'true' && github.actor == 'jwmcglynn' && github.triggering_actor == 'jwmcglynn' }}

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download coverage artifact
        uses: actions/download-artifact@v7
        with:
          name: self-hosted-coverage-report
          path: coverage-report

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage-report/filtered_report.dat
          disable_search: true
          flags: unittests
          fail_ci_if_error: true
          verbose: true
