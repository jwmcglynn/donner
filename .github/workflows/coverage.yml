name: Coverage

# Runs coverage on main merges and nightly. Use workflow_dispatch for manual runs.
on:
  push:
    branches: [main]
  schedule:
    # Run nightly at 06:00 UTC (11pm PT)
    - cron: '0 6 * * *'
  workflow_dispatch:  # Allow manual triggers

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: 11
          distribution: "microsoft"

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: coverage-${{ runner.os }}
          repository-cache: true
          external-cache: true
          cache-save: ${{ github.ref == 'refs/heads/main' }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libncurses-dev pkg-config libfontconfig1-dev libfreetype6-dev

      - name: Generate coverage
        run: |
          tools/coverage.sh --quiet --no-html

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage-report/filtered_report.dat
          flags: unittests
          fail_ci_if_error: true
          verbose: true
