name: CI

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the main branch
on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

# Retry policy: network-sensitive steps (checkout, apt install, bazel fetch)
# are retried to survive transient GitHub/registry outages. Build/test steps
# are NOT retried -- a real test failure should surface immediately.

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 15
          command: |
            sudo apt-get update
            sudo apt-get install -y pkg-config libfontconfig1-dev libfreetype6-dev \
              libc++-18-dev libc++abi-18-dev \
              mesa-vulkan-drivers libvulkan1 libvulkan-dev
            # libc++ is needed because `bazelisk build //...` evaluates the
            # `resvg_test_suite_geode_*` variant targets. Those use the
            # `donner_variant_cc_test` multi-transition, which promotes
            # `enable_dawn=true` for the geode sub-configuration. That
            # pulls in Dawn via `rules_foreign_cc`, whose CMake test-
            # compile inherits the bazel toolchain's `-stdlib=libc++`
            # flag.
            #
            # The mesa-vulkan-drivers + libvulkan stack is needed at
            # TEST time, not just build time: `bazelisk test //...` now
            # executes the Geode test variants through the
            # multi-transition, and Dawn's Vulkan backend needs an ICD
            # (llvmpipe via Mesa) to initialise. Without it, geode tests
            # crash on startup and show up as random pixel-diff
            # failures in the general linux job — separate from the
            # dedicated `linux-geode` job which already installed
            # these.

      - name: Cache Bazel
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/bazel
          key: ${{ runner.os }}-bazel-${{ hashFiles('.bazelversion', '.bazelrc', 'MODULE.bazel') }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      # bazelisk fetch downloads the toolchain and module dependencies. We retry
      # this step specifically to tolerate GitHub / BCR / Chromium rate limits,
      # without masking actual compilation errors in the subsequent build step.
      - name: Fetch Bazel dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 30
          command: bazelisk fetch //...

      - name: Build
        run: bazelisk build //...

      - name: Test
        run: bazelisk test --test_output=errors --local_test_jobs=2 //...

  # Experimental Geode (WebGPU + Slug) backend build/test on Linux.
  #
  # Runs `--config=geode`, which enables Dawn and Geode. The Linux CI host has
  # no GPU, so Dawn's Vulkan backend is paired with Mesa `llvmpipe` (a
  # software Vulkan ICD that Ubuntu ships in `mesa-vulkan-drivers`). Dawn
  # auto-discovers llvmpipe via the standard Vulkan loader and runs against
  # it — no env vars needed.
  #
  # Marked `continue-on-error: true` for now: first run against llvmpipe is
  # unproven locally (macOS uses Metal), and the Dawn compile is ~10 min on a
  # cold cache. Once we verify it works we can flip this to a blocking job.
  #
  # Scope: only the native Geode unit/integration tests. The
  # `renderer_geode_golden_tests` target is intentionally excluded because
  # the skeleton's Slug AA produces edge-pixel differences against the
  # tiny-skia goldens (Geode-specific goldens are a separate decision).
  linux-geode:
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libfontconfig1-dev libfreetype6-dev \
            mesa-vulkan-drivers libvulkan1 libvulkan-dev \
            libc++-18-dev libc++abi-18-dev

      - name: Cache Bazel
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/bazel
          key: ${{ runner.os }}-bazel-geode-${{ hashFiles('.bazelversion', '.bazelrc', 'MODULE.bazel') }}
          restore-keys: |
            ${{ runner.os }}-bazel-geode-
            ${{ runner.os }}-bazel-

      - name: Build Geode targets
        run: |
          bazelisk build --config=geode \
            //donner/svg/renderer/geode/... \
            //donner/svg/renderer:renderer_geode \
            //donner/svg/renderer/tests:renderer_geode_tests

      - name: Run Geode tests
        run: |
          bazelisk test --config=geode --test_output=errors --local_test_jobs=2 \
            //donner/svg/renderer/geode/... \
            //donner/svg/renderer/tests:renderer_geode_tests

  macos:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache Bazel
        uses: actions/cache@v5
        with:
          path: |
            /private/var/tmp/_bazel_runner/
          key: ${{ runner.os }}-bazel-${{ hashFiles('.bazelversion', '.bazelrc', 'MODULE.bazel') }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      - name: Fetch Bazel dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 30
          command: bazelisk fetch //...

      - name: Build
        run: bazelisk build //...

      - name: Test
        run: bazelisk test --test_output=errors //...

      # Run fuzzers on macOS via the LLVM 21 toolchain (Apple Clang lacks
      # libclang_rt.fuzzer_osx.a, but --config=asan-fuzzer activates
      # --config=latest_llvm which does provide it). This closes the gap where
      # bazel test //... on macOS skips fuzzer targets.
      - name: Test fuzzers (libFuzzer via LLVM 21 toolchain)
        run: |
          bazelisk test \
            --config=asan-fuzzer \
            --test_output=errors \
            --test_tag_filters=fuzz_target \
            --build_tag_filters=fuzz_target \
            //... || true
        # Marked informational for now: fuzzer tests were previously macOS-disabled
        # so we don't want to break macOS CI during the rollout. Remove `|| true`
        # and the comment once the fuzzer corpus passes cleanly on macOS.
