name: CI

# Controls when the action will run. Triggers the workflow on pushes to any
# branch and PRs targeting the mainline branches we actively use.
on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('pr-{0}-{1}', github.workflow, github.event.pull_request.number) || format('push-{0}-{1}', github.workflow, github.run_id) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: read

# Retry policy: network-sensitive steps (checkout, apt install, bazel fetch)
# are retried to survive transient GitHub/registry outages. Build/test steps
# are NOT retried -- a real test failure should surface immediately.

# Self-hosted runner gates (repo Settings -> Variables). Setting
# SELFHOSTED_LINUX_RUNNER / SELFHOSTED_MACOS_RUNNER to "true" routes the
# operator's own matching OS lane onto the homelab ARM64 runner and skips the
# matching GitHub-hosted lane; everyone else stays GitHub-hosted. Gated on BOTH
# github.actor and github.triggering_actor == jwmcglynn so that no collaborator
# push -- and no rerun of the operator's run by someone else -- can execute on
# the runner or poison the shared LAN Bazel cache. Unset is a no-op: behavior
# is identical to the GitHub-hosted-only workflow.
#
# Main CI stays GitHub-hosted so a stuck/offline self-hosted runner can never
# hang main's required check. PR CI uses the self-hosted lane only for trusted
# partial-target runs; hosted runners remain the PR fallback for untrusted
# actors, unavailable self-hosted runners, fallback //... runs, and
# `ci:full-test` fanout runs. Other branch refs do not run build/test jobs.

jobs:
  gatekeeper:
    runs-on: ubuntu-24.04
    outputs:
      docs_only: ${{ steps.docs_only.outputs.docs_only }}
      is_duplicate_push: ${{ steps.dup_push.outputs.is_duplicate_push }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - id: dup_push
        name: Detect duplicate push (PR already open for this branch)
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          # When a `git push` lands on a branch that already has an open PR,
          # GitHub fires both a `push` and a `pull_request` (synchronize) event,
          # creating two parallel CI runs at the same SHA. We let the PR run do
          # the work and skip the push run cleanly so it shows green-skipped
          # instead of red-cancelled. Pushes to main, or to feature branches
          # without an open PR, are NOT skipped.
          if [[ "${{ github.event_name }}" != "push" ]]; then
            echo "is_duplicate_push=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "is_duplicate_push=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          open_prs="$(gh pr list --repo "${{ github.repository }}" \
            --state open --head "${{ github.ref_name }}" \
            --json number -q 'length')"
          if [[ "${open_prs}" -gt 0 ]]; then
            echo "Skipping push CI: open PR already covers branch '${{ github.ref_name }}'"
            echo "is_duplicate_push=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_duplicate_push=false" >> "$GITHUB_OUTPUT"
          fi

      - id: docs_only
        name: Detect docs-only PR
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          is_docs_only_path() {
            local path="$1"
            # Build-impacting files (.bazelignore changes Bazel package
            # discovery, .gitmodules changes vendored deps) are intentionally
            # NOT in this allowlist — see Codex review on PR #570.
            case "$path" in
              docs/*|CHANGELOG*|.editorconfig|.gitattributes|.gitignore)
                return 0
                ;;
            esac

            if [[ "$path" != */* && "$path" == *.md ]]; then
              return 0
            fi

            return 1
          }

          changed_files="$(git diff --name-only --diff-filter=ACMR \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}")"

          if [[ -z "$changed_files" ]]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          docs_only=true
          while IFS= read -r path; do
            [[ -z "$path" ]] && continue
            if ! is_docs_only_path "$path"; then
              echo "Non-doc change: $path"
              docs_only=false
              break
            fi
          done <<< "$changed_files"

          echo "docs_only=${docs_only}" >> "$GITHUB_OUTPUT"

  determine-targets:
    runs-on: ubuntu-24.04
    needs: gatekeeper
    if: ${{ needs.gatekeeper.outputs.is_duplicate_push != 'true' && (github.ref == 'refs/heads/main' || github.event_name == 'pull_request') && (github.event_name != 'pull_request' || needs.gatekeeper.outputs.docs_only != 'true') }}
    env:
      BAZEL_DIFF_TAG: "v18.1.0"
    outputs:
      fallback: ${{ steps.determine.outputs.fallback }}
      affected: ${{ steps.determine.outputs.affected }}
      full_test: ${{ steps.determine.outputs.full_test }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          repository-cache: true
          external-cache: true
          cache-save: false

      - name: Download bazel-diff
        run: curl -fsSL -o "$RUNNER_TEMP/bazel-diff.jar" "https://github.com/Tinder/bazel-diff/releases/download/${BAZEL_DIFF_TAG}/bazel-diff_deploy.jar"

      - id: pr-meta
        name: Extract SHA for hash caching
        shell: bash
        run: |
          set -euo pipefail
          base_sha=""
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="$(python3 -c 'import json, os; print(json.load(open(os.environ["GITHUB_EVENT_PATH"], encoding="utf-8")).get("pull_request", {}).get("base", {}).get("sha", ""))')"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            # Pre-warm the cache for future PRs whose base is this main commit.
            base_sha="${{ github.sha }}"
          fi
          echo "base_sha=$base_sha" >> "$GITHUB_OUTPUT"

      # Base hashes are a pure function of (bazel-diff version, base SHA), and
      # generating them is roughly half of this job's bazel-diff wall time.
      # PRs restore them here; pushes to main generate and save them below so
      # the first PR against any main commit already hits warm. Caches created
      # on main are visible to all PR branches.
      - name: Cache bazel-diff base hashes
        if: steps.pr-meta.outputs.base_sha != ''
        uses: actions/cache@v6
        with:
          path: ~/.cache/bazel-diff-base-hashes/${{ steps.pr-meta.outputs.base_sha }}.json
          key: bazel-diff-base-hashes-tt-${{ env.BAZEL_DIFF_TAG }}-${{ steps.pr-meta.outputs.base_sha }}

      - id: determine
        name: Determine affected Bazel targets
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "Non-PR event; keeping full //... coverage."
            echo "fallback=true" >> "$GITHUB_OUTPUT"
            echo "affected=" >> "$GITHUB_OUTPUT"
            echo "full_test=false" >> "$GITHUB_OUTPUT"

            if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
              cached="$HOME/.cache/bazel-diff-base-hashes/${{ github.sha }}.json"
              if [[ ! -f "$cached" ]]; then
                echo "Pre-warming bazel-diff hash cache for ${{ github.sha }}."
                mkdir -p "$(dirname "$cached")"
                java -jar "$RUNNER_TEMP/bazel-diff.jar" generate-hashes \
            --includeTargetType \
                  -w "$GITHUB_WORKSPACE" \
                  -b bazelisk \
                  "$cached" || rm -f "$cached"
              fi
            fi
            exit 0
          fi

          eval "$(
            python3 -c 'import json, os, shlex; event = json.load(open(os.environ["GITHUB_EVENT_PATH"], encoding="utf-8")); pr = event.get("pull_request", {}); labels = [label.get("name", "") for label in pr.get("labels", [])]; values = {"BASE_SHA": pr.get("base", {}).get("sha", ""), "HEAD_SHA": pr.get("head", {}).get("sha", ""), "FORCE_FULL_TEST": "true" if "ci:full-test" in labels else "false"}; print("\n".join(f"{key}={shlex.quote(value)}" for key, value in values.items()))'
          )"

          if [[ -z "$BASE_SHA" || -z "$HEAD_SHA" ]]; then
            echo "Missing PR base/head SHA; falling back to //...."
            echo "fallback=true" >> "$GITHUB_OUTPUT"
            echo "affected=" >> "$GITHUB_OUTPUT"
            echo "full_test=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$FORCE_FULL_TEST" == "true" ]]; then
            echo "ci:full-test label present; forcing full //... coverage."
            echo "fallback=true" >> "$GITHUB_OUTPUT"
            echo "affected=" >> "$GITHUB_OUTPUT"
            echo "full_test=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "full_test=false" >> "$GITHUB_OUTPUT"

          changed_files="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"

          if [[ -z "$changed_files" ]]; then
            echo "No changed files detected; falling back to //...."
            echo "fallback=true" >> "$GITHUB_OUTPUT"
            echo "affected=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          should_fallback=false
          while IFS= read -r path; do
            [[ -z "$path" ]] && continue
            case "$path" in
              MODULE.bazel|WORKSPACE|WORKSPACE.*|.bazelrc|build_defs/*|.github/workflows/*|.github/actions/*)
                echo "Infra change requires full //... coverage: $path"
                should_fallback=true
                break
                ;;
            esac
          done <<< "$changed_files"

          if [[ "$should_fallback" == "true" ]]; then
            echo "fallback=true" >> "$GITHUB_OUTPUT"
            echo "affected=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          work_dir="$(mktemp -d)"
          base_dir="$work_dir/base"
          head_dir="$work_dir/head"
          cleanup() {
            git worktree remove --force "$base_dir" 2>/dev/null || true
            git worktree remove --force "$head_dir" 2>/dev/null || true
            rm -rf "$work_dir"
          }
          trap cleanup EXIT

          git worktree add --detach "$head_dir" "$HEAD_SHA"

          cached_base="$HOME/.cache/bazel-diff-base-hashes/$BASE_SHA.json"
          if [[ -s "$cached_base" ]]; then
            echo "Using cached bazel-diff base hashes for $BASE_SHA."
            cp "$cached_base" "$work_dir/base-hashes.json"
          else
            git worktree add --detach "$base_dir" "$BASE_SHA"
            java -jar "$RUNNER_TEMP/bazel-diff.jar" generate-hashes \
            --includeTargetType \
              -w "$base_dir" \
              -b bazelisk \
              "$work_dir/base-hashes.json"
            # Save for subsequent pushes to this PR (post-job cache step).
            mkdir -p "$(dirname "$cached_base")"
            cp "$work_dir/base-hashes.json" "$cached_base"
          fi

          java -jar "$RUNNER_TEMP/bazel-diff.jar" generate-hashes \
            --includeTargetType \
            -w "$head_dir" \
            -b bazelisk \
            "$work_dir/head-hashes.json"

          java -jar "$RUNNER_TEMP/bazel-diff.jar" get-impacted-targets \
            -tt Rule \
            -w "$head_dir" \
            -b bazelisk \
            -sh "$work_dir/base-hashes.json" \
            -fh "$work_dir/head-hashes.json" \
            -o "$work_dir/affected.txt"

          affected="$(
            python3 -c 'import pathlib, sys; labels = [line.strip() for line in pathlib.Path(sys.argv[1]).read_text(encoding="utf-8").splitlines() if line.strip()]; print(" ".join(labels))' "$work_dir/affected.txt"
          )"

          if [[ -z "$affected" ]]; then
            echo "bazel-diff produced no affected targets; falling back to //...."
            echo "fallback=true" >> "$GITHUB_OUTPUT"
            echo "affected=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          manual_affected="$(
            cd "$head_dir"
            bazelisk query --keep_going "attr(\"tags\", \"manual\", set($affected))"
          )"
          if [[ -n "$manual_affected" ]]; then
            printf '%s\n' "$manual_affected" > "$work_dir/manual-affected.txt"
            affected="$(
              python3 -c 'import pathlib, sys; manual = set(pathlib.Path(sys.argv[2]).read_text(encoding="utf-8").splitlines()); labels = [line.strip() for line in pathlib.Path(sys.argv[1]).read_text(encoding="utf-8").splitlines() if line.strip() and line.strip() not in manual]; print(" ".join(labels))' "$work_dir/affected.txt" "$work_dir/manual-affected.txt"
            )"
            echo "Filtered $(grep -c . "$work_dir/manual-affected.txt") manual-tagged affected target(s)."
          fi

          if [[ -z "$affected" ]]; then
            echo "Only manual-tagged affected targets detected; falling back to //... coverage."
            echo "fallback=true" >> "$GITHUB_OUTPUT"
            echo "affected=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "fallback=false" >> "$GITHUB_OUTPUT"
          echo "affected=$affected" >> "$GITHUB_OUTPUT"

  linux:
    # GitHub-hosted x86_64 baseline. Suppressed for operator runs when the
    # self-hosted ARM64 lane is active (see gate comment above).
    runs-on: ubuntu-24.04
    needs: [gatekeeper, determine-targets]
    if: ${{ needs.gatekeeper.outputs.is_duplicate_push != 'true' && (github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && (needs.determine-targets.outputs.fallback == 'true' || needs.determine-targets.outputs.full_test == 'true' || vars.SELFHOSTED_LINUX_RUNNER != 'true' || github.actor != 'jwmcglynn' || github.triggering_actor != 'jwmcglynn'))) && (github.event_name != 'pull_request' || needs.gatekeeper.outputs.docs_only != 'true') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install system dependencies
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 15
          command: |
            sudo apt-get update
            sudo apt-get install -y pkg-config libfontconfig1-dev libfreetype6-dev \
              mesa-vulkan-drivers libvulkan1 libvulkan-dev \
              libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
              libgl1-mesa-dev libosmesa6 clang-tidy-19

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ runner.os }}-default
          repository-cache: true
          external-cache: true
          cache-save: ${{ github.ref == 'refs/heads/main' }}

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          TARGETS=$(if [[ "${{ needs.determine-targets.outputs.fallback }}" == "true" ]]; then
            echo "//..."
          else
            echo "${{ needs.determine-targets.outputs.affected }}"
          fi)
          bazelisk build --config=ci $TARGETS

      - name: Test
        id: test
        shell: bash
        run: |
          set -euo pipefail
          TARGETS=$(if [[ "${{ needs.determine-targets.outputs.fallback }}" == "true" ]]; then
            echo "//..."
          else
            echo "${{ needs.determine-targets.outputs.affected }}"
          fi)
          bazelisk test --config=ci --test_output=errors \
            $TARGETS

      # Forces a single-pass linker (gold) so a diamond-dependency archive that
      # loses its alwayslink (or a new one that needs it) is caught immediately
      # instead of only surfacing on a dev box whose default linker isn't lld.
      # See #665. Targets are the minimal set proven to reach every
      # link-order-sensitive library in that fix.
      - name: Linker canary (non-lld linker support)
        shell: bash
        run: |
          bazelisk build --config=ci --linkopt=-fuse-ld=gold \
            //donner/svg/tool:donner-svg \
            //donner/svg/renderer/tests:filter_graph_executor_tests

      - name: Upload Bazel test failure artifacts
        if: failure() && steps.test.outcome == 'failure'
        uses: ./.github/actions/upload-bazel-test-artifacts
        with:
          name: bazel-test-failure-${{ github.job }}-${{ runner.os }}-${{ runner.arch }}


  # Operator's ARM64 Linux runs on the operator's self-hosted runner.
  # Replaces `linux` for trusted partial-target operator runs (extra arch
  # coverage + homelab cache). Full fallback runs stay on hosted Linux because
  # the self-hosted lane is tuned for affected-target PR checks.
  # The NixOS host pre-provisions the toolchain (fontconfig, freetype, mesa,
  # vulkan, X11, clang-tidy) and writes bazel-cache1 over LAN gRPC, so there
  # is no apt/setup-bazel step. The runner intentionally has no host GPU
  # device passthrough; Mesa llvmpipe/lavapipe provide the same software
  # rendering path used by GitHub-hosted Linux so this lane runs the same test
  # surface instead of excluding graphics targets.
  linux-self-hosted:
    runs-on: [self-hosted, linux, arm64]
    needs: [gatekeeper, determine-targets]
    if: ${{ needs.gatekeeper.outputs.is_duplicate_push != 'true' && github.event_name == 'pull_request' && needs.gatekeeper.outputs.docs_only != 'true' && needs.determine-targets.outputs.fallback != 'true' && vars.SELFHOSTED_LINUX_RUNNER == 'true' && github.actor == 'jwmcglynn' && github.triggering_actor == 'jwmcglynn' }}
    # RE-availability SLA lane. A healthy affected-target run is ~21 min; bound
    # it at 30 so healthy runs can finish while a wedged/degraded RE endpoint
    # still fast-fails instead of silently tailing for hours.
    timeout-minutes: 30
    env:
      # The runner host may add the LAN Bazel cache from its home rc. Use that
      # acceleration when healthy, but do NOT fall back to local execution when
      # remote execution is down/degraded: a CPU-capped runner executing the
      # whole graph locally is the measured 2-3 h tail. Fast-fail on RE
      # degradation; the wedge-watch + rerun recover.
      BAZEL_SELF_HOSTED_REMOTE_FALLBACK_FLAGS: "--remote_local_fallback=false --incompatible_remote_local_fallback_for_remote_cache=false --remote_timeout=5s"
      # Every self-hosted run uploads Bazel profiles + BEP + compact execution
      # logs so slow runs can be attributed to targets/actions without live
      # SSH. Keep artifacts small; retention is 3 days. DIAG_DIR is exported
      # from the first step ($RUNNER_TEMP; the `runner` context is not
      # available in job-level env).
      # Build without the Bytes: the runner microvm is a thin RE client on a
      # CPU-capped host. Downloading every toplevel output (unstripped ARM64
      # test binaries) added minutes of pure transfer per run. Tests execute
      # remotely, so only test logs/XML need to come back.
      DIAG_BUILD_FLAGS: "--remote_download_outputs=minimal"
      DIAG_TEST_FLAGS: "--remote_download_outputs=minimal --remote_download_regex=.*(test\\.log|test\\.xml|outputs\\.zip)$"
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Record target selection
        shell: bash
        run: |
          set -euo pipefail
          DIAG_DIR="$RUNNER_TEMP/donner-ci-diagnostics"
          echo "DIAG_DIR=$DIAG_DIR" >> "$GITHUB_ENV"
          mkdir -p "$DIAG_DIR"/{fetch,build,test}
          {
            echo "run_id=${{ github.run_id }} attempt=${{ github.run_attempt }} sha=${{ github.sha }}"
            echo "fallback=${{ needs.determine-targets.outputs.fallback }}"
          } | tee "$DIAG_DIR/manifest.txt"
          if [[ "${{ needs.determine-targets.outputs.fallback }}" == "true" ]]; then
            echo "//..." > "$DIAG_DIR/target-list.txt"
          else
            echo "${{ needs.determine-targets.outputs.affected }}" | tr ' ' '\n' > "$DIAG_DIR/target-list.txt"
          fi
          echo "target_count=$(grep -c . "$DIAG_DIR/target-list.txt")" | tee -a "$DIAG_DIR/manifest.txt"
          cat > "$DIAG_DIR/run_bazel_with_heartbeat.sh" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          log_path="$1"
          shift
          started=$SECONDS

          {
            "$@" &
            command_pid=$!

            (
              while kill -0 "$command_pid" 2>/dev/null; do
                sleep 60
                if kill -0 "$command_pid" 2>/dev/null; then
                  echo "::notice::Bazel command still running for $((SECONDS - started))s"
                fi
              done
            ) &
            heartbeat_pid=$!

            set +e
            wait "$command_pid"
            status=$?
            set -e

            kill "$heartbeat_pid" 2>/dev/null || true
            wait "$heartbeat_pid" 2>/dev/null || true
            exit "$status"
          } 2>&1 | tee "$log_path"
          exit "${PIPESTATUS[0]}"
          EOF
          chmod +x "$DIAG_DIR/run_bazel_with_heartbeat.sh"

      - name: Sync Bazel toolchain
        # NixOS injects include paths via NIX_CFLAGS_COMPILE, which Bazel does
        # not track in cc_configure's cache key; a stale @local_config_cc then
        # omits them and the hermetic include scanner rejects /nix/store
        # headers. Surgically reset ONLY @local_config_cc so it regenerates
        # against the current env. This replaces `bazelisk clean --expunge`,
        # which also wiped the persistent /var/cache/bazel LLVM toolchain and
        # forced a ~5-minute re-download+re-extract of it on every run.
        shell: bash
        run: |
          set -euo pipefail
          output_base=$(bazelisk info output_base)
          bazelisk shutdown
          # Match the repo dir + marker under any Bzlmod canonical name
          # (local_config_cc, ...+local_config_cc, @local_config_cc.marker).
          find "$output_base/external" -maxdepth 1 -name '*local_config_cc*' \
            -print -exec rm -rf {} + 2>/dev/null || true

      - name: Fetch Bazel LLVM toolchain
        shell: bash
        run: |
          set -euo pipefail
          TARGETS=$(if [[ "${{ needs.determine-targets.outputs.fallback }}" == "true" ]]; then
            echo "//..."
          else
            echo "${{ needs.determine-targets.outputs.affected }}"
          fi)

          fetch_llvm() {
            bazelisk fetch --config=ci --config=latest_llvm \
              $BAZEL_SELF_HOSTED_REMOTE_FALLBACK_FLAGS \
              $TARGETS
          }

          cleanup_partial_llvm_fetch() {
            local output_base
            output_base=$(bazelisk info output_base 2>/dev/null || true)
            bazelisk shutdown || true

            echo "::group::Bazel disk state before LLVM fetch retry"
            df -h /var/cache/bazel "$GITHUB_WORKSPACE" || true
            if [[ -n "$output_base" && -d "$output_base/external" ]]; then
              du -sh "$output_base"/external/*llvm_toolchain_linux_aarch64_llvm* 2>/dev/null || true
            fi
            echo "::endgroup::"

            if [[ -n "$output_base" && -d "$output_base/external" ]]; then
              find "$output_base/external" -maxdepth 1 -name '*llvm_toolchain_linux_aarch64_llvm*' \
                -print -exec rm -rf {} + 2>/dev/null || true
            fi
          }

          if ! fetch_llvm; then
            cleanup_partial_llvm_fetch
            fetch_llvm
          fi
          # NOTE: no `bazelisk shutdown` here. Keeping the server alive lets
          # Build reuse this invocation's loading/analysis instead of paying
          # a fresh JVM start + ~30 s re-analysis.

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          TARGETS=$(if [[ "${{ needs.determine-targets.outputs.fallback }}" == "true" ]]; then
            echo "//..."
          else
            echo "${{ needs.determine-targets.outputs.affected }}"
          fi)
          "$DIAG_DIR/run_bazel_with_heartbeat.sh" "$DIAG_DIR/build/console.log" \
            bazelisk build --config=ci --config=latest_llvm \
            $BAZEL_SELF_HOSTED_REMOTE_FALLBACK_FLAGS \
            $DIAG_BUILD_FLAGS \
            --profile="$DIAG_DIR/build/profile.gz" \
            --build_event_json_file="$DIAG_DIR/build/bep.json" \
            --nobuild_event_json_file_path_conversion \
            --execution_log_compact_file="$DIAG_DIR/build/exec.log.zst" \
            $TARGETS

      - name: Test
        id: test
        shell: bash
        run: |
          set -euo pipefail
          TARGETS=$(if [[ "${{ needs.determine-targets.outputs.fallback }}" == "true" ]]; then
            echo "//..."
          else
            echo "${{ needs.determine-targets.outputs.affected }}"
          fi)
          "$DIAG_DIR/run_bazel_with_heartbeat.sh" "$DIAG_DIR/test/console.log" \
            bazelisk test --config=ci --config=latest_llvm --test_output=errors \
            $BAZEL_SELF_HOSTED_REMOTE_FALLBACK_FLAGS \
            $DIAG_TEST_FLAGS \
            --profile="$DIAG_DIR/test/profile.gz" \
            --build_event_json_file="$DIAG_DIR/test/bep.json" \
            --nobuild_event_json_file_path_conversion \
            --execution_log_compact_file="$DIAG_DIR/test/exec.log.zst" \
            $TARGETS

      - name: Summarize diagnostics
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f tools/ci_diagnostics_report.py && -f "$DIAG_DIR/build/profile.gz" ]]; then
            python3 tools/ci_diagnostics_report.py "$DIAG_DIR" | tee "$DIAG_DIR/report.md" || true
            if [[ -s "$DIAG_DIR/report.md" ]]; then
              cat "$DIAG_DIR/report.md" >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

      - name: Upload CI diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ci-diagnostics-${{ github.job }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/donner-ci-diagnostics/
          retention-days: 3
          if-no-files-found: ignore

      - name: Upload Bazel test failure artifacts
        if: failure() && steps.test.outcome == 'failure'
        uses: ./.github/actions/upload-bazel-test-artifacts
        with:
          name: bazel-test-failure-${{ github.job }}-${{ runner.os }}-${{ runner.arch }}


  macos:
    runs-on: macos-26
    needs: [gatekeeper, determine-targets]
    if: ${{ needs.gatekeeper.outputs.is_duplicate_push != 'true' && (github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && (needs.determine-targets.outputs.fallback == 'true' || needs.determine-targets.outputs.full_test == 'true' || vars.SELFHOSTED_MACOS_RUNNER != 'true' || github.actor != 'jwmcglynn' || github.triggering_actor != 'jwmcglynn'))) && (github.event_name != 'pull_request' || needs.gatekeeper.outputs.docs_only != 'true') }}
    env:
      # Xcode's libc++ marks std::format floating-point support as macOS 13.3+.
      # Set the CI deployment target explicitly so hosted and self-hosted macOS
      # compile the same target instead of inheriting host defaults.
      BAZEL_MACOS_BUILD_FLAGS: "--macos_minimum_os=13.3"
      # gen_cmakelists_test invokes Homebrew LLVM from inside Bazel's test
      # sandbox; Homebrew's tool wrappers require HOME.
      BAZEL_MACOS_TEST_FLAGS: "--test_env=HOME"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install clang-tidy
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 15
          command: |
            brew install --quiet llvm@19
            echo "/opt/homebrew/opt/llvm@19/bin" >> "$GITHUB_PATH"

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ runner.os }}-default
          repository-cache: true
          external-cache: true
          cache-save: ${{ github.ref == 'refs/heads/main' }}

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          TARGETS=$(if [[ "${{ needs.determine-targets.outputs.fallback }}" == "true" ]]; then
            echo "//..."
          else
            echo "${{ needs.determine-targets.outputs.affected }}"
          fi)
          bazelisk build --config=ci $BAZEL_MACOS_BUILD_FLAGS $TARGETS

      - name: Test
        id: test
        shell: bash
        run: |
          set -euo pipefail
          TARGETS=$(if [[ "${{ needs.determine-targets.outputs.fallback }}" == "true" ]]; then
            echo "//..."
          else
            echo "${{ needs.determine-targets.outputs.affected }}"
          fi)
          bazelisk test --config=ci --test_output=errors \
            $BAZEL_MACOS_BUILD_FLAGS $BAZEL_MACOS_TEST_FLAGS $TARGETS
        # Fuzzer regression suite runs in `.github/workflows/fuzz.yml` on a
        # nightly cron so it doesn't gate every main push. PRs touching
        # fuzzer code re-trigger that workflow via path filter.

      - name: Upload Bazel test failure artifacts
        if: failure() && steps.test.outcome == 'failure'
        uses: ./.github/actions/upload-bazel-test-artifacts
        with:
          name: bazel-test-failure-${{ github.job }}-${{ runner.os }}-${{ runner.arch }}


  # Operator's ARM64 macOS runs on the operator's self-hosted runner.
  # Replaces `macos` for trusted partial-target operator runs. Full fallback
  # runs stay on hosted macOS. The host pre-provisions Bazelisk, Homebrew
  # llvm@19, and Xcode Command Line Tools.
  macos-self-hosted:
    runs-on: [self-hosted, macOS, ARM64]
    needs: [gatekeeper, determine-targets]
    if: ${{ needs.gatekeeper.outputs.is_duplicate_push != 'true' && github.event_name == 'pull_request' && needs.gatekeeper.outputs.docs_only != 'true' && needs.determine-targets.outputs.fallback != 'true' && vars.SELFHOSTED_MACOS_RUNNER == 'true' && github.actor == 'jwmcglynn' && github.triggering_actor == 'jwmcglynn' }}
    # RE-availability SLA lane. Bound at 30 min so healthy affected-target
    # runs can finish while RE degradation still fast-fails instead of tailing
    # for hours on the capped host.
    timeout-minutes: 30
    env:
      # The runner host has an operator ~/.bazelrc for interactive RE/cache work.
      # The invocations below use --nohome_rc so CI matches GitHub-hosted macOS
      # and only picks up cache settings declared in this workflow. RE/cache
      # outages now FAST-FAIL (no local fallback) rather than degrading to a
      # multi-hour local build on the capped host. The wedge-watch + rerun
      # handle recovery.
      BAZEL_MACOS_BUILD_FLAGS: "--macos_minimum_os=13.3 --remote_cache=grpc://192.168.1.63:9092 --remote_upload_local_results=true --remote_local_fallback=false --incompatible_remote_local_fallback_for_remote_cache=false --remote_timeout=5s"
      BAZEL_MACOS_TEST_FLAGS: "--test_env=HOME"
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Prepare self-hosted macOS toolchain
        shell: bash
        run: |
          set -euo pipefail
          echo "/opt/homebrew/bin" >> "$GITHUB_PATH"
          echo "/opt/homebrew/opt/llvm@19/bin" >> "$GITHUB_PATH"
          test -x /opt/homebrew/bin/bazelisk
          test -x /opt/homebrew/bin/bazel
          test -x /opt/homebrew/opt/llvm@19/bin/clang-tidy

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          TARGETS=$(if [[ "${{ needs.determine-targets.outputs.fallback }}" == "true" ]]; then
            echo "//..."
          else
            echo "${{ needs.determine-targets.outputs.affected }}"
          fi)
          bazelisk --nohome_rc build --config=ci $BAZEL_MACOS_BUILD_FLAGS $TARGETS

      - name: Test
        id: test
        shell: bash
        run: |
          set -euo pipefail
          TARGETS=$(if [[ "${{ needs.determine-targets.outputs.fallback }}" == "true" ]]; then
            echo "//..."
          else
            echo "${{ needs.determine-targets.outputs.affected }}"
          fi)
          bazelisk --nohome_rc test --config=ci --test_output=errors \
            $BAZEL_MACOS_BUILD_FLAGS $BAZEL_MACOS_TEST_FLAGS $TARGETS
        # Fuzzer regression suite runs in `.github/workflows/fuzz.yml` on a
        # nightly cron so it doesn't gate every main push. PRs touching
        # fuzzer code re-trigger that workflow via path filter.

      - name: Upload Bazel test failure artifacts
        if: failure() && steps.test.outcome == 'failure'
        uses: ./.github/actions/upload-bazel-test-artifacts
        with:
          name: bazel-test-failure-${{ github.job }}-${{ runner.os }}-${{ runner.arch }}
