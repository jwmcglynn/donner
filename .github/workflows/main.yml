name: CI

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the main branch
on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Cache Bazel
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/bazel
          key: ${{ runner.os }}-bazel-${{ hashFiles('.bazelversion', '.bazelrc', 'MODULE.bazel') }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      - name: Build
        run: |
          bazelisk build //...

      - name: Test
        run: |
          bazelisk test --test_output=errors //...

  linux-skia:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Cache Bazel
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/bazel
          key: ${{ runner.os }}-bazel-skia-${{ hashFiles('.bazelversion', '.bazelrc', 'MODULE.bazel') }}
          restore-keys: |
            ${{ runner.os }}-bazel-skia-

      - name: Build (Skia backend)
        run: |
          bazelisk build --config=skia //...

      - name: Test (Skia backend)
        run: |
          bazelisk test --config=skia --test_output=errors //...

  macos-skia:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Cache Bazel
        uses: actions/cache@v5
        with:
          path: |
            /private/var/tmp/_bazel_runner/
          key: ${{ runner.os }}-bazel-skia-${{ hashFiles('.bazelversion', '.bazelrc', 'MODULE.bazel') }}
          restore-keys: |
            ${{ runner.os }}-bazel-skia-

      - name: Build (Skia backend)
        run: |
          bazelisk build --config=skia //...

      - name: Test (Skia backend)
        run: |
          bazelisk test --config=skia --test_output=errors //...

  macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Cache Bazel
        uses: actions/cache@v5
        with:
          path: |
            /private/var/tmp/_bazel_runner/
          key: ${{ runner.os }}-bazel-${{ hashFiles('.bazelversion', '.bazelrc', 'MODULE.bazel') }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      - name: Build
        run: |
          bazelisk build //...

      - name: Test
        run: |
          bazelisk test --test_output=errors //...
