name: CI

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the main branch
on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

# Retry policy: network-sensitive steps (checkout, apt install, bazel fetch)
# are retried to survive transient GitHub/registry outages. Build/test steps
# are NOT retried -- a real test failure should surface immediately.

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 15
          command: |
            sudo apt-get update
            sudo apt-get install -y pkg-config libfontconfig1-dev libfreetype6-dev \
              mesa-vulkan-drivers libvulkan1 libvulkan-dev
            # mesa-vulkan-drivers + libvulkan1 are needed at TEST time:
            # `bazelisk test //...` now executes the Geode test variants
            # through `donner_variant_cc_test`'s multi-transition, and
            # wgpu-native's Vulkan backend needs an ICD (llvmpipe via
            # Mesa) to initialise on a headless Linux host. Without it,
            # Geode tests crash on device creation and surface as random
            # pixel-diff failures — separate from the dedicated
            # `linux-geode` job which already installs these.
            #
            # libc++ is *not* required: the historical Dawn path pulled
            # it in via `rules_foreign_cc`'s CMake test-compile, but the
            # wgpu-native swap replaces that with an http_archive drop of
            # a prebuilt `libwgpu_native.so`, so no cross-stdlib compile
            # happens during fetch.

      - name: Cache Bazel
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/bazel
          key: ${{ runner.os }}-bazel-${{ hashFiles('.bazelversion', '.bazelrc', 'MODULE.bazel') }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      # bazelisk fetch downloads the toolchain and module dependencies. We retry
      # this step specifically to tolerate GitHub / BCR / Chromium rate limits,
      # without masking actual compilation errors in the subsequent build step.
      - name: Fetch Bazel dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 30
          command: bazelisk fetch //...

      - name: Build
        run: bazelisk build //...

      - name: Test
        # The `resvg_test_suite_geode_*` variants run ~1500 image comparisons
        # each through wgpu-native's Vulkan backend against Mesa `llvmpipe`
        # (software rasteriser). On GHA `ubuntu-24.04` each variant clocks in
        # at >30 minutes — well past the generic linux job's budget. The
        # dedicated `linux-geode` job owns Geode test coverage; the general
        # linux job excludes those two variants explicitly.
        run: |
          bazelisk test --test_output=errors --local_test_jobs=2 \
            -- //... \
            -//donner/svg/renderer/tests:resvg_test_suite_geode_text \
            -//donner/svg/renderer/tests:resvg_test_suite_geode_text_full

  # Experimental Geode (WebGPU + Slug) backend build/test on Linux.
  #
  # Runs `--config=geode`, which enables the Geode renderer backend. The
  # Linux CI host has no GPU, so wgpu-native's Vulkan backend is paired with
  # Mesa `llvmpipe` (a software Vulkan ICD that Ubuntu ships in
  # `mesa-vulkan-drivers`). wgpu-native auto-discovers llvmpipe via the
  # standard Vulkan loader and runs against it — no env vars needed.
  #
  # Marked `continue-on-error: true` for now: first run against llvmpipe is
  # unproven locally (macOS uses Metal). Runtime on a cold cache is now
  # dominated by the shared renderer build, not the WebGPU fetch — the
  # vendored wgpu-native prebuilt is a ~12 MB http_archive.
  #
  # Scope: the native Geode unit/integration tests plus the two
  # `resvg_test_suite_geode_*` variants that the general linux job now
  # explicitly excludes (they each run ~1500 image comparisons against
  # llvmpipe and exceed the generic job's runner budget). The
  # `renderer_geode_golden_tests` target is intentionally excluded because
  # the skeleton's Slug AA produces edge-pixel differences against the
  # tiny-skia goldens (Geode-specific goldens are a separate decision).
  #
  # Job-level `timeout-minutes: 90` covers the worst-case where both resvg
  # variants serialise under `--local_test_jobs=2` on a cold cache.
  linux-geode:
    runs-on: ubuntu-24.04
    continue-on-error: true
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libfontconfig1-dev libfreetype6-dev \
            mesa-vulkan-drivers libvulkan1 libvulkan-dev

      - name: Cache Bazel
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/bazel
          key: ${{ runner.os }}-bazel-geode-${{ hashFiles('.bazelversion', '.bazelrc', 'MODULE.bazel') }}
          restore-keys: |
            ${{ runner.os }}-bazel-geode-
            ${{ runner.os }}-bazel-

      - name: Build Geode targets
        run: |
          bazelisk build --config=geode \
            //donner/svg/renderer/geode/... \
            //donner/svg/renderer:renderer_geode \
            //donner/svg/renderer/tests:renderer_geode_tests

      - name: Run Geode tests
        run: |
          bazelisk test --config=geode --test_output=errors --local_test_jobs=2 \
            //donner/svg/renderer/geode/... \
            //donner/svg/renderer/tests:renderer_geode_tests

      - name: Run Geode resvg variants (llvmpipe)
        run: |
          bazelisk test --test_output=errors --local_test_jobs=1 \
            //donner/svg/renderer/tests:resvg_test_suite_geode_text \
            //donner/svg/renderer/tests:resvg_test_suite_geode_text_full

  macos:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache Bazel
        uses: actions/cache@v5
        with:
          path: |
            /private/var/tmp/_bazel_runner/
          key: ${{ runner.os }}-bazel-${{ hashFiles('.bazelversion', '.bazelrc', 'MODULE.bazel') }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      - name: Fetch Bazel dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 30
          command: bazelisk fetch //...

      - name: Build
        run: bazelisk build //...

      - name: Test
        run: bazelisk test --test_output=errors //...

      # Run fuzzers on macOS via the LLVM 21 toolchain (Apple Clang lacks
      # libclang_rt.fuzzer_osx.a, but --config=asan-fuzzer activates
      # --config=latest_llvm which does provide it). This closes the gap where
      # bazel test //... on macOS skips fuzzer targets.
      - name: Test fuzzers (libFuzzer via LLVM 21 toolchain)
        run: |
          bazelisk test \
            --config=asan-fuzzer \
            --test_output=errors \
            --test_tag_filters=fuzz_target \
            --build_tag_filters=fuzz_target \
            //... || true
        # Marked informational for now: fuzzer tests were previously macOS-disabled
        # so we don't want to break macOS CI during the rollout. Remove `|| true`
        # and the comment once the fuzzer corpus passes cleanly on macOS.
