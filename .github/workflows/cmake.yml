name: CMake Build

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

jobs:
  linux:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        # Skia CMake temporarily disabled: chromium.googlesource.com rate limits
        # git-sync-deps fetches (HTTP 403/429). Re-enable once stabilized.
        backend: [tiny_skia]
    steps:
      - uses: actions/checkout@v6

      - name: Install fontconfig and freetype
        if: matrix.backend == 'skia'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libfontconfig1-dev libfreetype6-dev

      - name: Cache CMake dependencies
        uses: actions/cache@v5
        with:
          path: build/_deps
          key: cmake-deps-linux-${{ matrix.backend }}-${{ hashFiles('tools/cmake/gen_cmakelists.py') }}
          restore-keys: |
            cmake-deps-linux-${{ matrix.backend }}-

      - name: Validate generated CMakeLists.txt
        run: python3 tools/cmake/gen_cmakelists.py --check

      - name: Build with CMake (${{ matrix.backend }})
        run: |
          python3 tools/cmake/gen_cmakelists.py
          cmake -S . -B build -DDONNER_RENDERER_BACKEND=${{ matrix.backend }}
          cmake --build build -j$(nproc)

  macos:
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        # Skia CMake temporarily disabled: chromium.googlesource.com rate limits
        # git-sync-deps fetches (HTTP 403/429). Re-enable once stabilized.
        backend: [tiny_skia]
    steps:
      - uses: actions/checkout@v6

      - name: Cache CMake dependencies
        uses: actions/cache@v5
        with:
          path: build/_deps
          key: cmake-deps-macos-${{ matrix.backend }}-${{ hashFiles('tools/cmake/gen_cmakelists.py') }}
          restore-keys: |
            cmake-deps-macos-${{ matrix.backend }}-

      - name: Validate generated CMakeLists.txt
        run: python3 tools/cmake/gen_cmakelists.py --check

      - name: Build with CMake (${{ matrix.backend }})
        run: |
          python3 tools/cmake/gen_cmakelists.py
          cmake -S . -B build -DDONNER_RENDERER_BACKEND=${{ matrix.backend }}
          cmake --build build -j$(sysctl -n hw.logicalcpu)
