name: CMake Build

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main, feature/ci-hardening-2026q2]

# Superseded PR pushes cancel their in-flight CMake run so a rapid push storm
# does not pile up redundant hosted builds. Non-main branch pushes also cancel
# stale runs; main pushes stay unique via run_id so every main commit gets CI.
concurrency:
  group: ${{ github.event_name == 'pull_request' && format('pr-{0}-{1}', github.workflow, github.event.pull_request.number) || (github.ref == 'refs/heads/main' && format('push-{0}-{1}', github.workflow, github.run_id) || format('push-{0}-{1}', github.workflow, github.ref)) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref != 'refs/heads/main') }}

jobs:
  gatekeeper:
    runs-on: ubuntu-24.04
    outputs:
      docs_only: ${{ steps.docs_only.outputs.docs_only }}
      is_duplicate_push: ${{ steps.dup_push.outputs.is_duplicate_push }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - id: dup_push
        name: Detect duplicate push (PR already open for this branch)
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          # See main.yml for rationale; same dup-push detection.
          if [[ "${{ github.event_name }}" != "push" ]]; then
            echo "is_duplicate_push=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "is_duplicate_push=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          open_prs="$(gh pr list --repo "${{ github.repository }}" \
            --state open --head "${{ github.ref_name }}" \
            --json number -q 'length')"
          if [[ "${open_prs}" -gt 0 ]]; then
            echo "Skipping push CI: open PR already covers branch '${{ github.ref_name }}'"
            echo "is_duplicate_push=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_duplicate_push=false" >> "$GITHUB_OUTPUT"
          fi

      - id: docs_only
        name: Detect docs-only PR
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          is_docs_only_path() {
            local path="$1"
            # Build-impacting files (.bazelignore changes Bazel package
            # discovery, .gitmodules changes vendored deps) are intentionally
            # NOT in this allowlist — see Codex review on PR #570.
            case "$path" in
              docs/*|CHANGELOG*|.editorconfig|.gitattributes|.gitignore)
                return 0
                ;;
            esac

            if [[ "$path" != */* && "$path" == *.md ]]; then
              return 0
            fi

            return 1
          }

          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"
          # Diff from the merge-base, not the base tip: base.sha is the base
          # branch's CURRENT tip, so a two-dot diff attributes post-fork drift
          # on main to the PR and can wrongly clear docs_only for a genuine
          # docs-only branch. Fail closed: if merge-base cannot be computed,
          # keep the base-tip diff (drift can only flip docs_only to false,
          # which runs MORE CI, never less).
          if diff_base="$(git merge-base "$base_sha" "$head_sha")"; then
            echo "Using merge-base $diff_base as diff basis."
          else
            echo "git merge-base failed; using base tip $base_sha as diff basis."
            diff_base="$base_sha"
          fi
          changed_files="$(git diff --name-only --diff-filter=ACMR \
            "$diff_base" "$head_sha")"

          if [[ -z "$changed_files" ]]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          docs_only=true
          while IFS= read -r path; do
            [[ -z "$path" ]] && continue
            if ! is_docs_only_path "$path"; then
              echo "Non-doc change: $path"
              docs_only=false
              break
            fi
          done <<< "$changed_files"

          echo "docs_only=${docs_only}" >> "$GITHUB_OUTPUT"

  validate-generator:
    runs-on: ubuntu-24.04
    needs: gatekeeper
    if: ${{ needs.gatekeeper.outputs.is_duplicate_push != 'true' && (github.event_name != 'pull_request' || needs.gatekeeper.outputs.docs_only != 'true') }}
    steps:
      - uses: actions/checkout@v7

      - name: Validate generated CMakeLists.txt
        run: python3 tools/cmake/gen_cmakelists.py --check

  linux:
    runs-on: ubuntu-24.04
    needs: [gatekeeper, validate-generator]
    if: ${{ needs.gatekeeper.outputs.is_duplicate_push != 'true' && (github.event_name != 'pull_request' || needs.gatekeeper.outputs.docs_only != 'true') }}
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 750M
    # Keep the only active backend as a non-matrix job so a superseded run and
    # its replacement use the same stable check name. Reintroduce distinct jobs
    # when the Skia CMake lane is restored.
    steps:
      - uses: actions/checkout@v7

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ccache ninja-build
          sudo apt-get clean

      # Cache key includes both gen_cmakelists.py AND MODULE.bazel because the
      # generated CMakeLists.txt embeds FetchContent versions extracted from
      # MODULE.bazel. A version bump must invalidate the cached build/_deps
      # tree -- otherwise FetchContent's git stash/unstash dance fails when it
      # tries to retarget a cached source checkout to the new tag.
      # external_deps.json and the Bazel lock/module-extension files are included
      # because they can change emitted CMake dependency edges.
      # restore-keys is intentionally absent: a partial-match restore would
      # bring in incompatible state.
      - name: Cache CMake dependencies
        uses: actions/cache@v6
        with:
          path: build/_deps
          key: cmake-deps-linux-tiny_skia-${{ hashFiles('tools/cmake/gen_cmakelists.py', 'tools/cmake/external_deps.json', 'MODULE.bazel', 'MODULE.bazel.lock', 'third_party/bazel/non_bcr_deps.bzl') }}

      - name: Cache compiler outputs
        uses: actions/cache@v6
        with:
          path: .ccache
          key: ccache-linux-tiny_skia-${{ github.sha }}
          restore-keys: |
            ccache-linux-tiny_skia-

      - name: Build with CMake (tiny_skia)
        run: |
          ccache --zero-stats
          ccache --max-size="$CCACHE_MAXSIZE"
          python3 tools/cmake/gen_cmakelists.py
          cmake -S examples/cmake_consumer -B build -G Ninja \
            -DDONNER_SOURCE_DIR="${PWD}" \
            -DDONNER_RENDERER_BACKEND=tiny_skia \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build build --target donner_cmake_consumer --parallel
          ctest --test-dir build --output-on-failure
          ccache --show-stats

  macos:
    runs-on: macos-26
    needs: [gatekeeper, validate-generator]
    if: ${{ needs.gatekeeper.outputs.is_duplicate_push != 'true' && (github.event_name != 'pull_request' || needs.gatekeeper.outputs.docs_only != 'true') }}
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 750M
    # Keep this paired with the stable Linux job name above.
    steps:
      - uses: actions/checkout@v7

      - name: Install build tools
        run: |
          missing=()
          command -v ccache >/dev/null || missing+=(ccache)
          command -v ninja >/dev/null || missing+=(ninja)
          if [[ ${#missing[@]} -gt 0 ]]; then
            brew install "${missing[@]}"
          fi

      # See linux job above for why restore-keys is absent.
      - name: Cache CMake dependencies
        uses: actions/cache@v6
        with:
          path: build/_deps
          key: cmake-deps-macos-tiny_skia-${{ hashFiles('tools/cmake/gen_cmakelists.py', 'tools/cmake/external_deps.json', 'MODULE.bazel', 'MODULE.bazel.lock', 'third_party/bazel/non_bcr_deps.bzl') }}

      - name: Cache compiler outputs
        uses: actions/cache@v6
        with:
          path: .ccache
          key: ccache-macos-tiny_skia-${{ github.sha }}
          restore-keys: |
            ccache-macos-tiny_skia-

      - name: Build with CMake (tiny_skia)
        run: |
          ccache --zero-stats
          ccache --max-size="$CCACHE_MAXSIZE"
          python3 tools/cmake/gen_cmakelists.py
          cmake -S examples/cmake_consumer -B build -G Ninja \
            -DDONNER_SOURCE_DIR="${PWD}" \
            -DDONNER_RENDERER_BACKEND=tiny_skia \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build build --target donner_cmake_consumer --parallel
          ctest --test-dir build --output-on-failure
          ccache --show-stats
