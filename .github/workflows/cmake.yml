name: CMake Build

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main, feature/ci-hardening-2026q2]

jobs:
  gatekeeper:
    runs-on: ubuntu-24.04
    outputs:
      docs_only: ${{ steps.docs_only.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: docs_only
        name: Detect docs-only PR
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          is_docs_only_path() {
            local path="$1"
            case "$path" in
              docs/*|CHANGELOG*|.bazelignore|.editorconfig|.gitattributes|.gitignore|.gitmodules)
                return 0
                ;;
            esac

            if [[ "$path" != */* && "$path" == *.md ]]; then
              return 0
            fi

            return 1
          }

          changed_files="$(git diff --name-only --diff-filter=ACMR \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}")"

          if [[ -z "$changed_files" ]]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          docs_only=true
          while IFS= read -r path; do
            [[ -z "$path" ]] && continue
            if ! is_docs_only_path "$path"; then
              echo "Non-doc change: $path"
              docs_only=false
              break
            fi
          done <<< "$changed_files"

          echo "docs_only=${docs_only}" >> "$GITHUB_OUTPUT"

  linux:
    runs-on: ubuntu-24.04
    needs: gatekeeper
    if: ${{ github.event_name != 'pull_request' || needs.gatekeeper.outputs.docs_only != 'true' }}
    strategy:
      fail-fast: false
      matrix:
        # Skia CMake temporarily disabled: chromium.googlesource.com rate limits
        # git-sync-deps fetches (HTTP 403/429). Re-enable once stabilized.
        backend: [tiny_skia]
    steps:
      - uses: actions/checkout@v6

      - name: Install fontconfig and freetype
        if: matrix.backend == 'skia'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libfontconfig1-dev libfreetype6-dev

      # Cache key includes both gen_cmakelists.py AND MODULE.bazel because the
      # generated CMakeLists.txt embeds FetchContent versions extracted from
      # MODULE.bazel. A version bump must invalidate the cached build/_deps
      # tree -- otherwise FetchContent's git stash/unstash dance fails when it
      # tries to retarget a cached source checkout to the new tag.
      # restore-keys is intentionally absent: a partial-match restore would
      # bring in incompatible state.
      - name: Cache CMake dependencies
        uses: actions/cache@v5
        with:
          path: build/_deps
          key: cmake-deps-linux-${{ matrix.backend }}-${{ hashFiles('tools/cmake/gen_cmakelists.py', 'MODULE.bazel') }}

      - name: Validate generated CMakeLists.txt
        run: python3 tools/cmake/gen_cmakelists.py --check

      - name: Build with CMake (${{ matrix.backend }})
        run: |
          python3 tools/cmake/gen_cmakelists.py
          cmake -S . -B build -DDONNER_RENDERER_BACKEND=${{ matrix.backend }}
          cmake --build build -j$(nproc)

  macos:
    runs-on: macos-15
    needs: gatekeeper
    if: ${{ github.event_name != 'pull_request' || needs.gatekeeper.outputs.docs_only != 'true' }}
    strategy:
      fail-fast: false
      matrix:
        # Skia CMake temporarily disabled: chromium.googlesource.com rate limits
        # git-sync-deps fetches (HTTP 403/429). Re-enable once stabilized.
        backend: [tiny_skia]
    steps:
      - uses: actions/checkout@v6

      # See linux job above for why restore-keys is absent.
      - name: Cache CMake dependencies
        uses: actions/cache@v5
        with:
          path: build/_deps
          key: cmake-deps-macos-${{ matrix.backend }}-${{ hashFiles('tools/cmake/gen_cmakelists.py', 'MODULE.bazel') }}

      - name: Validate generated CMakeLists.txt
        run: python3 tools/cmake/gen_cmakelists.py --check

      - name: Build with CMake (${{ matrix.backend }})
        run: |
          python3 tools/cmake/gen_cmakelists.py
          cmake -S . -B build -DDONNER_RENDERER_BACKEND=${{ matrix.backend }}
          cmake --build build -j$(sysctl -n hw.logicalcpu)
