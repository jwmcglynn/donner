name: Editor WASM

on:
  schedule:
    - cron: "18 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: editor-wasm-${{ runner.os }}
          repository-cache: true
          external-cache: true
          cache-save: true

      # The Geode/WebGPU package is the production presentation path. A headed
      # browser test below verifies its swapchain pixels through the visible canvas.
      - name: Build editor wasm package (Geode)
        run: |
          bazelisk build --config=editor-wasm //donner/editor/wasm:wasm_web_package

      # The tiny_skia software-fallback package draws the document into the
      # WebGL canvas, so headless screenshots capture real pixels. We build AND
      # run the Playwright smoke suite against it to validate desktop-parity
      # software rendering end to end.
      - name: Build editor wasm package (tiny_skia)
        run: |
          bazelisk build --config=editor-wasm-tiny-skia \
            //donner/editor/wasm:wasm_tiny_skia_web_package

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        working-directory: donner/editor/wasm/tests
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Serve Geode package and run headed Playwright suite
        env:
          DONNER_WASM_BASE_URL: http://127.0.0.1:8000
          DONNER_WASM_BACKEND: geode
        run: |
          set -euo pipefail

          pkg_dir=$(bazelisk cquery --config=editor-wasm --output=files \
            //donner/editor/wasm:wasm_web_package | head -n1)
          echo "Serving package: ${pkg_dir}"
          test -d "${pkg_dir}"

          python3 tools/http/simple_webserver.py --no-https --host 127.0.0.1 \
            --dir "${pkg_dir}" &
          server_pid=$!
          trap 'kill "${server_pid}" 2>/dev/null || true' EXIT

          for _ in $(seq 1 60); do
            if curl -fsS -o /dev/null "${DONNER_WASM_BASE_URL}/index.html"; then
              break
            fi
            sleep 1
          done
          curl -fsS -o /dev/null "${DONNER_WASM_BASE_URL}/index.html"

          xvfb-run --auto-servernum bash donner/editor/wasm/tests/run_tests.sh --headed

      - name: Serve tiny_skia package and run Playwright suite
        env:
          DONNER_WASM_BASE_URL: http://127.0.0.1:8000
          DONNER_WASM_BACKEND: tiny_skia
        run: |
          set -euo pipefail

          # Resolve the built web-package directory (a Bazel tree artifact).
          pkg_dir=$(bazelisk cquery --config=editor-wasm-tiny-skia --output=files \
            //donner/editor/wasm:wasm_tiny_skia_web_package | head -n1)
          echo "Serving package: ${pkg_dir}"
          test -d "${pkg_dir}"

          # Plain-HTTP local server (127.0.0.1 is a secure context, and the
          # server still sends COOP/COEP so SharedArrayBuffer/pthreads work).
          python3 tools/http/simple_webserver.py --no-https --host 127.0.0.1 \
            --dir "${pkg_dir}" &
          server_pid=$!
          trap 'kill "${server_pid}" 2>/dev/null || true' EXIT

          # Wait for the server to accept connections.
          for _ in $(seq 1 60); do
            if curl -fsS -o /dev/null "${DONNER_WASM_BASE_URL}/index.html"; then
              break
            fi
            sleep 1
          done
          curl -fsS -o /dev/null "${DONNER_WASM_BASE_URL}/index.html"

          bash donner/editor/wasm/tests/run_tests.sh

      - name: Stage immutable Geode deployment candidate
        id: stage-geode-candidate
        run: |
          set -euo pipefail

          pkg_dir=$(bazelisk cquery --config=editor-wasm --output=files \
            //donner/editor/wasm:wasm_web_package | head -n1)
          candidate_dir="${RUNNER_TEMP}/donner-editor-wasm-geode-${GITHUB_SHA}"
          site_dir="${candidate_dir}/site"
          mkdir -p "${site_dir}"
          cp -R "${pkg_dir}/." "${site_dir}/"

          for required_file in index.html editor.js editor.wasm enable-threads.js donner_icon.svg; do
            test -f "${site_dir}/${required_file}"
          done

          lockfile_sha256=$(sha256sum donner/editor/wasm/tests/package-lock.json | awk '{print $1}')
          printf '{"source_revision":"%s","lockfile_sha256":"%s","bazel_config":"editor-wasm","target":"//donner/editor/wasm:wasm_web_package"}\n' \
            "${GITHUB_SHA}" "${lockfile_sha256}" > "${candidate_dir}/provenance.json"

          (
            cd "${candidate_dir}"
            find site -type f -print0 | LC_ALL=C sort -z | xargs -0 sha256sum > SHA256SUMS
          )

          echo "candidate_dir=${candidate_dir}" >> "${GITHUB_OUTPUT}"

      - name: Upload Geode deployment candidate
        id: upload-geode-candidate
        uses: actions/upload-artifact@v7
        with:
          name: donner-editor-wasm-geode-${{ github.sha }}
          path: ${{ steps.stage-geode-candidate.outputs.candidate_dir }}
          if-no-files-found: error
          retention-days: 30

      - name: Record deployment candidate digest
        run: |
          echo "### Geode deployment candidate" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Source revision: \`${GITHUB_SHA}\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Artifact digest: \`${{ steps.upload-geode-candidate.outputs.artifact-digest }}\`" \
            >> "${GITHUB_STEP_SUMMARY}"
