name: Sanitizers

# Runs the sanitizer variants on a nightly schedule, but first checks whether
# main has advanced since the last successful run so idle days don't consume CI.
on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  gatekeeper:
    runs-on: ubuntu-24.04
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Decide whether nightly sanitizer jobs should run
        id: decide
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "Manual dispatch requested; running sanitizer jobs."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --no-tags --depth=1 origin main
          main_sha="$(git rev-parse origin/main)"
          last_success_sha="$(gh run list \
            --workflow=sanitizers.yml \
            --status=success \
            --limit=1 \
            --json headSha \
            --jq '.[0].headSha')"

          if [[ -z "$last_success_sha" || "$last_success_sha" == "null" ]]; then
            echo "No previous successful sanitizers.yml run found; running sanitizer jobs."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif [[ "$last_success_sha" == "$main_sha" ]]; then
            echo "origin/main has not advanced since the last successful sanitizers.yml run; skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "origin/main advanced from $last_success_sha to $main_sha; running sanitizer jobs."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  asan:
    runs-on: ubuntu-24.04
    needs: gatekeeper
    if: needs.gatekeeper.outputs.should_run == 'true'
    # A cold sanitizer build plus the full sharded suite has exceeded 60 minutes while still
    # making forward progress. Keep the test command bounded without truncating its results.
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install system dependencies
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 15
          command: |
            sudo apt-get update
            sudo apt-get install -y pkg-config libfontconfig1-dev libfreetype6-dev \
              mesa-vulkan-drivers libvulkan1 libvulkan-dev \
              libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
              libgl1-mesa-dev libosmesa6 clang-tidy-19

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ runner.os }}-asan
          repository-cache: true
          external-cache: true
          cache-save: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}

      - name: Configure BuildBuddy remote cache
        uses: ./.github/actions/buildbuddy-cache
        with:
          api-key: ${{ secrets.BUILDBUDDY_API_KEY }}

      - name: Test //donner/... with ASan
        run: |
          # The blocking Fuzz workflow owns fuzz_target tests under ASan. Excluding them here keeps
          # this job focused on unit and integration coverage without running each timed fuzzer twice.
          # The GL replay suite is a wall-clock race/performance harness whose far-zoom case exceeds
          # its 180 s per-case watchdog under ASan; normal and UBSan lanes retain that coverage.
          # Native Geode tests use raw non-owning webgpu.hpp handles in their harnesses, so run that
          # package separately with leak detection disabled while retaining ASan memory-safety checks.
          bazelisk test \
            --config=asan \
            --test_output=errors \
            --test_tag_filters=-fuzz_target \
            --build_tag_filters=-fuzz_target \
            -- \
            //donner/... \
            -//donner/editor/tests:gl_rnr_replay_tests \
            -//donner/svg/renderer/geode/... \
            -//donner/svg/renderer/tests:renderer_geode_golden_tests \
            -//donner/svg/renderer/tests:renderer_geode_tests

          bazelisk test \
            --config=asan \
            --test_output=errors \
            --test_env=ASAN_OPTIONS=detect_leaks=0 \
            --test_tag_filters=-fuzz_target \
            --build_tag_filters=-fuzz_target \
            //donner/svg/renderer/geode/... \
            //donner/svg/renderer/tests:renderer_geode_golden_tests \
            //donner/svg/renderer/tests:renderer_geode_tests

  ubsan:
    runs-on: ubuntu-24.04
    needs: gatekeeper
    if: needs.gatekeeper.outputs.should_run == 'true'
    # A cold sanitizer build plus the full sharded suite has exceeded 60 minutes while still
    # making forward progress. Keep the test command bounded without truncating its results.
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install system dependencies
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 15
          command: |
            sudo apt-get update
            sudo apt-get install -y pkg-config libfontconfig1-dev libfreetype6-dev \
              mesa-vulkan-drivers libvulkan1 libvulkan-dev \
              libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
              libgl1-mesa-dev libosmesa6 clang-tidy-19

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ runner.os }}-ubsan
          repository-cache: true
          external-cache: true
          cache-save: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}

      - name: Configure BuildBuddy remote cache
        uses: ./.github/actions/buildbuddy-cache
        with:
          api-key: ${{ secrets.BUILDBUDDY_API_KEY }}

      - name: Test //donner/... with UBSan
        run: |
          # The blocking Fuzz workflow owns fuzz_target tests under ASan. The targeted UBSan fuzzer
          # regression for An+B integer overflow is recorded separately in the candidate review.
          bazelisk test \
            --config=ubsan \
            --test_output=errors \
            --test_tag_filters=-fuzz_target \
            --build_tag_filters=-fuzz_target \
            //donner/...
