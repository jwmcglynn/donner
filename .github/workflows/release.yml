name: Release

# Trigger on when a release is created or changed.
on:
  release:
    types: [published, edited]
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install Clang dependencies
        run: |
          sudo apt-get install -y libncurses-dev

      - name: Cache Bazel
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/bazel
          key: ${{ runner.os }}-bazel-${{ hashFiles('.bazelversion', '.bazelrc', 'MODULE.bazel') }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      - name: Build Binaries
        run: |
          mkdir release
          bazelisk build -c opt //donner/svg/tool:donner-svg
          cp bazel-bin/donner/svg/tool/donner-svg release/donner-svg_linux_x86_64

      - name: Upload the Binaries
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref }}
          file: ./release/donner-svg_linux_x86_64

  macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Cache Bazel
        uses: actions/cache@v5
        with:
          path: |
            /private/var/tmp/_bazel_runner/
          key: ${{ runner.os }}-bazel-${{ hashFiles('.bazelversion', '.bazelrc', 'MODULE.bazel') }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      - name: Build Binaries
        run: |
          mkdir release
          bazelisk build -c opt //donner/svg/tool:donner-svg
          cp bazel-bin/donner/svg/tool/donner-svg release/donner-svg_darwin_arm64

      - name: Upload the Binaries
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref }}
          file: ./release/donner-svg_darwin_arm64

  # Publish a new entry to the Bazel Central Registry when a GitHub Release
  # is published. Uses the bazel-contrib Publish-to-BCR reusable workflow,
  # which reads .bcr/ templates from this repo (config.yml, metadata.template.json,
  # source.template.json, presubmit.yml) and opens a PR on
  # bazelbuild/bazel-central-registry from a maintainer's fork.
  #
  # One-time setup required:
  #   1. Install the Publish-to-BCR GitHub App on jwmcglynn/donner
  #   2. Fork bazelbuild/bazel-central-registry as jwmcglynn/bazel-central-registry
  #   3. Install the app on that fork too
  #   4. Create a Classic PAT with `repo` + `workflow` scopes and save as
  #      the BCR_PUBLISH_TOKEN repo secret (fine-grained PATs are not
  #      currently supported for opening PRs against public repos)
  #
  # See docs/design_docs/bcr_release.md for the full runbook.
  publish-to-bcr:
    if: github.event_name == 'release' && github.event.action == 'published'
    needs: [linux, macos]
    permissions:
      id-token: write       # Needed to attest provenance
      attestations: write   # Needed to attest provenance
      contents: write       # Needed to upload release files
    uses: bazel-contrib/publish-to-bcr/.github/workflows/publish.yaml@v1.2.0
    with:
      tag_name: ${{ github.event.release.tag_name }}
      registry_fork: jwmcglynn/bazel-central-registry
    secrets:
      publish_token: ${{ secrets.BCR_PUBLISH_TOKEN }}
