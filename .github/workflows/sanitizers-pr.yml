name: Sanitizers PR

on:
  pull_request:
    branches: [main]
    paths:
      - "donner/svg/renderer/geode/**"
      - "donner/svg/renderer/RendererDriver.*"
      - "donner/svg/renderer/RendererGeode.*"

# Superseded PR pushes cancel their in-flight sanitizer run so a rapid push
# storm does not pile up redundant hosted sanitizer builds.
concurrency:
  group: ${{ github.event_name == 'pull_request' && format('pr-{0}-{1}', github.workflow, github.event.pull_request.number) || format('push-{0}-{1}', github.workflow, github.run_id) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  asan-geode:
    name: asan-geode
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    # Failure is tolerated at the workflow level AND the test step below
    # swallows its exit code so the individual PR check reports green.
    # Breaking `main`'s required-check list is not acceptable while issue
    # #552's fix is still in flight — the job stays informational, with the
    # real failure surfaced via ::warning:: GHA annotations.
    #
    # TODO(doc 0031 M1.2): drop this continue-on-error AND the `set +e` /
    # `exit 0` wrapper in the test step once main is green under
    # `--config=asan --config=geode` and the job can be a real gate.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install system dependencies
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 15
          command: |
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends \
              pkg-config libfontconfig1-dev libfreetype6-dev \
              mesa-vulkan-drivers libvulkan1 libvulkan-dev \
              libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
              libgl1-mesa-dev clang-tidy-19
            sudo apt-get clean

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ runner.os }}-asan-geode
          repository-cache: true
          external-cache: true
          cache-save: ${{ github.ref == 'refs/heads/main' }}

      - name: Configure BuildBuddy remote cache
        uses: ./.github/actions/buildbuddy-cache
        with:
          api-key: ${{ secrets.BUILDBUDDY_API_KEY }}

      - name: Test (Geode ASan) — informational, non-blocking
        shell: bash
        run: |
          set +e
          bazelisk test --config=asan --config=geode --test_output=errors \
            //donner/svg/renderer/tests:resvg_test_suite_geode
          rc=$?
          if [[ $rc -ne 0 ]]; then
            echo "::warning title=asan-geode informational failure::Geode ASan test failed (exit $rc). Expected until issue #552's fix lands on main; see doc 0031 M1.2. Click the job for the ASan report."
          else
            echo "::notice::Geode ASan test passed — doc 0031 M1.2 is ready to tighten into a hard gate (drop continue-on-error + the exit-code swallow)."
          fi
          exit 0
