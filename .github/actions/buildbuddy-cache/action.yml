name: Configure BuildBuddy remote cache
description: >-
  Enable the BuildBuddy remote cache on GitHub-hosted CI lanes when the
  BUILDBUDDY_API_KEY repo secret is present. This action is a no-op (fully
  inert) when the key is empty, so every lane behaves byte-for-byte as it did
  before until an operator adds the secret. It writes a bazelrc fragment that
  the workspace .bazelrc picks up via `try-import`; it never edits the build
  or test commands themselves.

inputs:
  api-key:
    description: >-
      BuildBuddy API key. Pass `secrets.BUILDBUDDY_API_KEY`. When empty (the
      default, and the state until the operator adds the secret) this action
      does nothing and the build runs with no remote cache.
    required: false
    default: ""
  download-outputs-minimal:
    description: >-
      When "true" (default), add `--remote_download_outputs=minimal` to avoid
      downloading cache-hit intermediates on the (executor-less) cache lanes.
      Set "false" for lanes that must materialize all outputs locally, e.g. the
      coverage lane which collects lcov data from the build tree.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Configure BuildBuddy remote cache
      shell: bash
      env:
        # Secret indirection: GitHub secrets are not readable in `if:`
        # conditions, so the key is passed in as an env var and the presence
        # gate is a shell test below (the standard, supported pattern).
        BUILDBUDDY_API_KEY: ${{ inputs.api-key }}
        DOWNLOAD_MINIMAL: ${{ inputs.download-outputs-minimal }}
        EVENT_NAME: ${{ github.event_name }}
      run: |
        set -euo pipefail

        # No key -> write nothing and exit. This is the inert path: with no
        # fragment file, the `try-import` in .bazelrc is a silent no-op and the
        # build is identical to a run without this action. Self-hosted lanes
        # never call this action, so they are unaffected regardless.
        if [[ -z "${BUILDBUDDY_API_KEY}" ]]; then
          echo "BUILDBUDDY_API_KEY not set; BuildBuddy remote cache disabled (inert no-op)."
          exit 0
        fi

        # Never let the key surface in logs, even if a later step prints flags.
        echo "::add-mask::${BUILDBUDDY_API_KEY}"

        # PRs are read-only against the shared cache: they may READ hits but
        # must never WRITE, so a broken or malicious PR cannot poison the cache
        # that main relies on. Only trusted main-push / scheduled lanes upload.
        if [[ "${EVENT_NAME}" == "pull_request" ]]; then
          upload_local_results="false"
        else
          upload_local_results="true"
        fi

        fragment="${GITHUB_WORKSPACE}/.buildbuddy.bazelrc"
        {
          echo "# Generated by .github/actions/buildbuddy-cache. Do not commit."
          echo "build --remote_cache=grpcs://remote.buildbuddy.io"
          echo "build --remote_header=x-buildbuddy-api-key=${BUILDBUDDY_API_KEY}"
          echo "build --remote_timeout=60s"
          echo "build --remote_upload_local_results=${upload_local_results}"
          if [[ "${DOWNLOAD_MINIMAL}" == "true" ]]; then
            echo "build --remote_download_outputs=minimal"
          fi
        } > "${fragment}"

        # Report the resolved config WITHOUT printing the fragment (it holds the
        # key). `build` options are inherited by test/coverage/run in Bazel.
        echo "BuildBuddy remote cache enabled:"
        echo "  event=${EVENT_NAME}"
        echo "  remote_cache=grpcs://remote.buildbuddy.io"
        echo "  remote_upload_local_results=${upload_local_results}"
        echo "  remote_download_outputs_minimal=${DOWNLOAD_MINIMAL}"
        echo "  fragment=${fragment} (loaded via try-import in .bazelrc)"
