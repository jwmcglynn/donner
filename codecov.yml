ignore:
  - "third_party/**"

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
        informational: true
    patch:
      default:
        target: auto
        threshold: 0%
        only_pulls: true

comment:
  layout: "header, diff, flags, files, footer"

parsers:
  gcov:
    branch_detection:
      conditional: no
      loop: yes
      method: no
      macro: no
