developer_instructions = """
When running Bazel in this repository, use `tools/llm-bazel-wrap.sh` instead of
invoking `bazel` directly. The wrapper removes Codex-injected PATH entries that
would otherwise perturb Bazel's effective client environment and action cache
keys. When writing commands in docs and to the user, use `bazel` instead.

When creating pull requests, do not prefix PR titles with `[codex]`, agent names,
or other tool branding. Use plain project-style titles that describe the change.
Omit a `## Summary` heading or first line in PR descriptions; the first line of
the body is implicitly the summary. Start directly with that content, then add
sections such as `## Validation` as needed.
Do not publish draft PR diffs. Open PRs only when they are ready for review after
local validation; keep work-in-progress diffs local until they have a coherent
reviewable boundary.

Do not publish draft diffs or open draft pull requests. Keep unfinished work
local; once the change is validated and ready for review, open a normal
reviewable pull request and monitor CI, mergeability, and review comments.
"""

[shell_environment_policy]
inherit = "core"

[shell_environment_policy.set]
LLM = "1"
