<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="donner_icon.svg" type="image/svg+xml">
    <title>Donner SVG Editor</title>
    <script src="enable-threads.js"></script>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #111;
      }

      .emscripten {
        position: absolute;
        inset: 0;
        margin: 0;
        border: 0;
        display: block;
        overflow: hidden;
      }

      #canvas:focus {
        outline: none;
      }

      #status {
        position: fixed;
        left: 16px;
        bottom: 16px;
        padding: 8px 10px;
        border-radius: 6px;
        background: rgba(0, 0, 0, 0.72);
        color: #d5d5d5;
        font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
        z-index: 5;
      }
    </style>
  </head>
  <body>
    <script>
      const firefoxHttpOverrideUrl = "https://developer.mozilla.org/en-US/docs/Web/API/Service_Worker_API";
      window.__donnerCanStartWasm = typeof SharedArrayBuffer !== "undefined";
      if (!window.__donnerCanStartWasm) {
        const secureHint =
            window.isSecureContext
                ? "This page is secure, but cross-origin isolation is not active."
                : "This URL is not a secure context. Use HTTPS for LAN access, or use http://localhost for local development.";
        document.body.innerHTML = `
          <div style="font-family: sans-serif; color: #f66; padding: 1rem;">
            <h1>Threaded WebAssembly is unavailable</h1>
            <p>Donner SVG Editor's pthread build requires <code>SharedArrayBuffer</code> and cross-origin isolation.</p>
            <p>${secureHint}</p>
            <p>Firefox has a DevTools-only testing override for HTTP:
              <a href="${firefoxHttpOverrideUrl}" target="_blank" rel="noopener noreferrer">${firefoxHttpOverrideUrl}</a>
            </p>
            <p>If you are using the local HTTPS server, accept or trust the generated local certificate first, then reload.</p>
          </div>
        `;
        console.error("SharedArrayBuffer is unavailable");
      }
    </script>

    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="0"></canvas>
    <div id="status">Loading Donner Editor…</div>

    <script>
      const canvas = document.getElementById("canvas");
      const status = document.getElementById("status");

      var Module = {
        preRun: [],
        postRun: [],
        print: function(text) { console.log(text); },
        printErr: function(text) { console.error(text); },
        setStatus: function(text) {
          status.textContent = text || "";
        },
        monitorRunDependencies: function(left) {
          if (left > 0) {
            status.textContent = `Loading… (${left} remaining)`;
          }
        },
        onRuntimeInitialized: function() {
          status.style.display = "none";
          canvas.focus();
        },
        locateFile: function(path, prefix) {
          if (path.endsWith(".wasm")) {
            return prefix + "editor.wasm";
          }
          return prefix + path;
        },
        canvas: canvas,
        contextAttributes: {
          preserveDrawingBuffer: true,
        },
      };
      canvas.addEventListener("webglcontextlost", function(event) {
        alert("WebGL context lost. Reload the page.");
        event.preventDefault();
      }, false);
    </script>
    <script>
      if (window.__donnerCanStartWasm) {
        const loader = document.createElement("script");
        loader.async = true;
        loader.type = "text/javascript";
        loader.src = "editor.js";
        document.body.appendChild(loader);
      }
    </script>
  </body>
</html>
