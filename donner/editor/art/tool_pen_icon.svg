          fill="#000000" stroke="#ffffff" stroke-width="1.5" />
    <rect x="13.7081" y="19.4036" width="7.22447" height="3"
          transform="rotate(-45 13.7081 19.4036)"
          fill="#000000" stroke="#ffffff" stroke-width="1.5" />
    <line x1="5.92996" y1="5.96852" x2="10.8797" y2="10.9183"
          stroke="#ffffff" stroke-width="1.25" />
  </g>
  <circle cx="12.2939" cy="12.3325" r="1.6" fill="#ffffff" />
</svg>
