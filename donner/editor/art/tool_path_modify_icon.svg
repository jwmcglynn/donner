    <path d="M 5 18 C 5 10 11 5.5 19 5.5" />
    <line x1="5" y1="18" x2="10" y2="12" />
    <circle cx="11" cy="10.5" r="1.6" fill="#000000" />
  </g>
  <rect x="3" y="16" width="4" height="4" fill="#000000" />
  <rect x="17" y="3.5" width="4" height="4" fill="#000000" />
</svg>
