<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
  <!-- Selection tool: tailless arrowhead, two-tone (black core, white outline)
       so the toolbar icon reads as the same glyph as the select cursor (QA-F7;
       supersedes the earlier tailed single-color mask). -->
  <path
    d="M 5 3 L 5 19 L 9.5 14.5 L 16 14.5 Z"
    fill="#000000" stroke="#ffffff" stroke-width="1.5"
    stroke-linejoin="round" stroke-linecap="round" />
</svg>
