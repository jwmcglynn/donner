<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Pen tool: the classic fountain-nib silhouette (solid black core, white
       outline), matching the QA2 reference. The nib tip is the hotspot at the
       top-left (4,4); the body runs down-right to a rounded shoulder, with a
       slit from the tip and a small vent hole near the shoulder. -->
  <g id="pen-cursor-glyph" stroke-linejoin="round" stroke-linecap="round">
    <path
      d="M 4.5 4.5 C 13 6 19 11 19.5 19.5 C 11 19 6 13 4.5 4.5 Z"
      fill="#000000" stroke="#ffffff" stroke-width="1.75" />
    <line x1="6.6" y1="6.6" x2="12.8" y2="12.8" stroke="#ffffff" stroke-width="1.2" />
    <circle cx="15.4" cy="15.4" r="1.5" fill="#ffffff" />
  </g>
</svg>
