<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Pen tool, close-path state: the solid nib (hotspot 4,4) plus a small "o"
       badge at bottom-right (a click would close the active contour). Mirrors
       the QA2 reference (nib + open ring). -->
  <g id="pen-close-cursor-glyph" stroke-linejoin="round" stroke-linecap="round">
    <path
      d="M 4.5 4.5 C 13 6 19 11 19.5 19.5 C 11 19 6 13 4.5 4.5 Z"
      fill="#000000" stroke="#ffffff" stroke-width="1.75" />
    <line x1="6.6" y1="6.6" x2="12.8" y2="12.8" stroke="#ffffff" stroke-width="1.2" />
    <circle cx="15.4" cy="15.4" r="1.5" fill="#ffffff" />
    <circle cx="24" cy="23.5" r="3.4" fill="none" stroke="#ffffff" stroke-width="3" />
    <circle cx="24" cy="23.5" r="3.4" fill="none" stroke="#000000" stroke-width="1.6" />
  </g>
</svg>
