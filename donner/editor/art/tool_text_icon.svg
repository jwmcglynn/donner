<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
  <!-- Type tool: a serif capital T, two-tone via the line-glyph technique
       (a wider white pass under a narrower black pass) so it carries the same
       black-core/white-outline theme as the cursors. -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <g stroke="#ffffff" stroke-width="3.8">
      <line x1="5" y1="5.5" x2="19" y2="5.5" />
      <line x1="12" y1="5.5" x2="12" y2="18.5" />
      <line x1="8.5" y1="18.5" x2="15.5" y2="18.5" />
    </g>
    <g stroke="#000000" stroke-width="2.4">
      <line x1="5" y1="5.5" x2="19" y2="5.5" />
      <line x1="12" y1="5.5" x2="12" y2="18.5" />
      <line x1="8.5" y1="18.5" x2="15.5" y2="18.5" />
    </g>
  </g>
</svg>
