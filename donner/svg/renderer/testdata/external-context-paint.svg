<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <!-- Elements that use context-fill and context-stroke from the parent <use> element -->
  <rect id="contextRect" x="10" y="10" width="80" height="80" rx="10"
        fill="context-fill" stroke="context-stroke" stroke-width="4"/>
  <circle id="contextCircle" cx="50" cy="50" r="25"
          fill="context-stroke" stroke="context-fill" stroke-width="3"/>
</svg>
