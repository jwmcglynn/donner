<svg xmlns="http://www.w3.org/2000/svg" width="192" height="64" viewBox="0 0 192 64">
  <!-- Three strips showing pad / reflect / repeat for radial gradients. The
       gradient covers only the central 30% of each strip's bounding box so
       the spread behavior at the edges is visible. -->
  <defs>
    <radialGradient id="rp" gradientUnits="objectBoundingBox" cx="0.5" cy="0.5" r="0.3"
                    spreadMethod="pad">
      <stop offset="0" stop-color="white"/>
      <stop offset="1" stop-color="black"/>
    </radialGradient>
    <radialGradient id="rr" gradientUnits="objectBoundingBox" cx="0.5" cy="0.5" r="0.3"
                    spreadMethod="reflect">
      <stop offset="0" stop-color="white"/>
      <stop offset="1" stop-color="black"/>
    </radialGradient>
    <radialGradient id="rrp" gradientUnits="objectBoundingBox" cx="0.5" cy="0.5" r="0.3"
                    spreadMethod="repeat">
      <stop offset="0" stop-color="white"/>
      <stop offset="1" stop-color="black"/>
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="64" height="64" fill="url(#rp)"/>
  <rect x="64" y="0" width="64" height="64" fill="url(#rr)"/>
  <rect x="128" y="0" width="64" height="64" fill="url(#rrp)"/>
</svg>
