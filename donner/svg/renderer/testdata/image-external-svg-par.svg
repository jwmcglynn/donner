<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="400" height="200" viewBox="0 0 400 200">
  <!-- Background -->
  <rect width="400" height="200" fill="#eeeeee"/>

  <!-- External SVG with preserveAspectRatio="xMidYMid meet" (default) -->
  <image href="external-shapes.svg" x="10" y="10" width="180" height="180"/>

  <!-- External SVG with preserveAspectRatio="none" (stretches to fill) -->
  <image href="external-shapes.svg" x="210" y="10" width="180" height="180"
         preserveAspectRatio="none"/>
</svg>
