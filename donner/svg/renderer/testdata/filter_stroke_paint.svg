<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#f1f1f1" />

  <filter id="blur-stroke">
    <feGaussianBlur in="StrokePaint" stdDeviation="2" />
  </filter>

  <circle cx="100" cy="100" r="52" fill="none" stroke="seagreen" stroke-width="12"
          filter="url(#blur-stroke)" />
  <rect x="1" y="1" width="198" height="198" fill="none" stroke="black" />
</svg>
