<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <!-- Default objectBoundingBox units, concentric, pad. White core to
         black rim — exercises the F == C, fr == 0 fast path of radial_t. -->
    <radialGradient id="g1">
      <stop offset="0" stop-color="white"/>
      <stop offset="1" stop-color="black"/>
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="64" height="64" fill="url(#g1)"/>
</svg>
