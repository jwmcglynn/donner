<svg viewBox="0 0 240 100" xmlns="http://www.w3.org/2000/svg"
     font-family="Noto Sans" font-size="56" font-weight="bold">
    <!-- CR repro (PR #606, Codex P2): a span-level gradient fill/stroke must OVERRIDE
         the element-level pattern. Geode's drawText keyed `fillIsGradient` /
         `strokeIsGradient` off the element-level `hasPatternFill` / `patternStrokePaint`,
         so a `<tspan fill="url(#grad)">` inside `<text fill="url(#patt)">` was forced to
         render with the inherited pattern (alpha-collapsed → wrong), not its own gradient.
         tiny-skia (the parity oracle) renders the span gradient; this asserts geode does too.
         Outer glyphs (A, C) keep the element pattern; the middle (B) is the span gradient. -->
    <pattern id="patt" patternUnits="userSpaceOnUse" width="12" height="12">
        <rect x="0" y="0" width="6" height="6" fill="grey"/>
        <rect x="6" y="6" width="6" height="6" fill="green"/>
    </pattern>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0" stop-color="red"/>
        <stop offset="1" stop-color="blue"/>
    </linearGradient>
    <text x="12" y="64" fill="url(#patt)">A<tspan fill="url(#grad)">B</tspan>C</text>
</svg>
