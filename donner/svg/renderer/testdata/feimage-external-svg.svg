<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="200" height="200" viewBox="0 0 200 200">
  <!-- Background -->
  <rect width="200" height="200" fill="#eeeeee"/>

  <!-- Define a filter that uses feImage to pull in an external SVG -->
  <defs>
    <filter id="externalSvgFilter" x="0" y="0" width="100%" height="100%"
            filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse">
      <feImage href="external-shapes.svg" x="25" y="25" width="150" height="150"
               preserveAspectRatio="xMidYMid meet" result="extSvg"/>
      <feComposite in="extSvg" in2="SourceGraphic" operator="over"/>
    </filter>
  </defs>

  <!-- A green rectangle with the external SVG filter applied -->
  <rect x="25" y="25" width="150" height="150" fill="#44cc88" filter="url(#externalSvgFilter)"/>
</svg>
